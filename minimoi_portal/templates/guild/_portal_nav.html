{# Portal nav — injected into all /guild/* pages since they run in-process (not proxied) #}
<style id="portal-offset-css">
body{padding-top:38px!important;}
/* Subnav styles inlined here — guaranteed regardless of guild.css load order */
.guild-subnav{height:36px;display:flex;align-items:center;padding:0 1.5rem;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.15);}
.subnav-link{font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:rgba(198,138,94,0.7);text-decoration:none;padding:0 12px;height:36px;display:flex;align-items:center;border-bottom:2px solid transparent;}
.subnav-link:hover{color:#C68A5E;}
.subnav-link.subnav-active{color:#C68A5E;border-bottom-color:#C68A5E;font-weight:700;}
.subnav-dot{color:rgba(198,138,94,0.3);font-size:9px;}
</style>

  <a href="/" style="color:#C68A5E;font-weight:700;text-decoration:none;letter-spacing:-0.3px;margin-right:16px;">mini-moi</a>
  <span style="color:rgba(255,255,255,0.2);margin-right:16px;">|</span>
  <a href="/app/curator" style="color:#C68A5E;text-decoration:none;margin-right:14px;">Curator</a>
  <a href="/app/german" style="color:#C68A5E;text-decoration:none;margin-right:14px;">German</a>
  <a href="/app/portuguese" style="color:#C68A5E;text-decoration:none;margin-right:14px;">Meu Português</a>
  <a href="/guild" style="color:#ffffff;font-weight:600;text-decoration:none;margin-right:14px;">Guild</a>
  <a href="/app/cos" style="color:#C68A5E;text-decoration:none;">CoS</a>
  <a href="/account/password" style="color:rgba(255,255,255,0.45);text-decoration:none;margin-left:auto;margin-right:12px;">{{ user.display_name if user else '' }}</a>
