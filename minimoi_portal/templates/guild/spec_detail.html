<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ filename }} — Guild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/guild.css">
  <style>
    :root {
      --bg: #f5f0e8; --surface: #faf7f2; --surface2: #f0ebe0;
      --border: #ddd6c8; --text: #2a2418; --text-muted: #6b5f4e;
      --text-dim: #9e9080; --accent: #8b5e2a; --accent-dim: rgba(139,94,42,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    /* ── Guild nav ── */
    nav.guild-nav {
      position: sticky; top: 38px; z-index: 100;
      background: #2a1f14;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .guild-nav-brand {
      height: 44px; display: flex; align-items: center;
      padding: 0 1.5rem;
      font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size); letter-spacing: 0.08em;
    }
    .guild-nav-brand a { color: #C68A5E; text-decoration: none; }
    .guild-nav-brand a:hover { color: #ffffff; }
    .guild-nav-brand a.nav-active { color: #ffffff; font-weight: 700; }
    .nav-sep { color: rgba(255,255,255,0.2); margin: 0 12px; }
    .guild-subnav {
      height: 36px; display: flex; align-items: center;
      padding: 0 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.15);
    }
    .subnav-back {
      font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size);
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(198,138,94,0.6); text-decoration: none;
      padding: 0; height: 36px;
      display: flex; align-items: center;
    }
    .subnav-back:hover { color: rgba(198,138,94,0.9); }

    /* ── Content ── */
    .spec-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 40px 72px;
    }
    .spec-toolbar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .spec-filename {
      font-family: 'DM Mono', monospace; font-size: 10px;
      color: var(--text-dim); flex: 1;
    }
    .spec-btn {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 12px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--surface2);
      color: var(--text-muted); text-decoration: none; cursor: pointer;
      white-space: nowrap;
    }
    .spec-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Markdown content (same as roadmap) ── */
    .spec-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 400;
      color: var(--text); margin-bottom: 6px;
    }
    .spec-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 400;
      color: var(--text); margin-top: 36px; margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .spec-content h3 {
      font-family: 'DM Mono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
      margin-top: 20px; margin-bottom: 8px;
    }
    .spec-content p { color: var(--text-muted); line-height: 1.65; margin-bottom: 12px; font-size: 13.5px; }
    .spec-content ul, .spec-content ol { padding-left: 20px; margin-bottom: 14px; }
    .spec-content li { color: var(--text-muted); line-height: 1.6; font-size: 13.5px; margin-bottom: 5px; }
    .spec-content li strong { color: var(--text); }
    .spec-content code {
      font-family: 'DM Mono', monospace; font-size: 11px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--accent);
    }
    .spec-content pre {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; padding: 14px 16px; overflow-x: auto; margin-bottom: 16px;
    }
    .spec-content pre code { background: none; border: none; padding: 0; font-size: 11px; color: var(--text-muted); }
    .spec-content blockquote {
      border-left: 3px solid rgba(139,94,42,0.3);
      padding: 6px 16px; margin: 14px 0; color: var(--text-dim); font-style: italic;
    }
    .spec-content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .spec-content a { color: var(--accent); }
    .spec-content a:hover { text-decoration: underline; }
    .spec-content table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .spec-content th {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted); font-weight: 600;
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    .spec-content td { font-size: 13px; color: var(--text-muted); padding: 8px 12px; border-bottom: 1px solid rgba(221,214,200,0.5); }
    .spec-content tr:last-child td { border-bottom: none; }

    /* ── Print ── */
    @media print {
      nav.guild-nav, .spec-toolbar { display: none !important; }
      body { background: #ffffff; font-size: 12px; }
      .spec-wrap { padding: 0; max-width: 100%; }
      .spec-content a { color: inherit; text-decoration: none; }
      .spec-content code, .spec-content pre { background: #f4f4f4; border-color: #ddd; }
    }
  </style>
</head>
<body>
{% include 'guild/_portal_nav.html' %}

<nav class="guild-nav">
  {% include 'guild/_section_subnav.html' %}
  <div class="guild-subnav">
  </div>
</nav>

<div class="spec-wrap">
  <div class="spec-toolbar">
    <span class="spec-filename">{{ filename }}</span>
    <a href="/guild/build/spec/{{ filename }}/raw" class="spec-btn" download>↓ Download .md</a>
    <button class="spec-btn" onclick="window.print()">⎙ Print / PDF</button>
  </div>
  <div class="spec-content">
    {{ content | safe }}
  </div>
</div>

</body>
</html>
