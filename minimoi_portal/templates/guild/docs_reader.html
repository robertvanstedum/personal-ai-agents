<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ filename }} — Guild Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/guild.css">
  <style>
    :root {
      --bg: #f5f0e8; --surface: #faf7f2; --surface2: #f0ebe0;
      --border: #ddd6c8; --text: #2a2418; --text-muted: #6b5f4e;
      --text-dim: #9e9080; --accent: #8b5e2a; --accent-dim: rgba(139,94,42,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    nav.guild-nav { position: sticky; top: 0; z-index: 100; background: #2a1f14; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .guild-nav-brand { height: 44px; display: flex; align-items: center; padding: 0 1.5rem; font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size); letter-spacing: 0.08em; }
    .guild-nav-brand a { color: #C68A5E; text-decoration: none; }
    .guild-nav-brand a:hover { color: #fff; }
    .nav-sep { color: rgba(255,255,255,0.2); margin: 0 12px; }
    .guild-subnav { height: 36px; display: flex; align-items: center; padding: 0 1.5rem; border-top: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.15); gap: 4px; }
    .subnav-back { font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size); text-transform: uppercase; letter-spacing: 0.06em; color: rgba(198,138,94,0.5); text-decoration: none; padding: 0 14px 0 0; height: 36px; display: flex; align-items: center; margin-right: 10px; border-right: 1px solid rgba(255,255,255,0.1); }
    .subnav-back:hover { color: #C68A5E; }
    .subnav-filename { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(198,138,94,0.6); }
    .subnav-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    .gh-link { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); text-decoration: none; border: 1px solid rgba(255,255,255,0.12); border-radius: 4px; padding: 4px 10px; }
    .gh-link:hover { color: #C68A5E; border-color: rgba(198,138,94,0.4); }
    .date-badge { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(198,138,94,0.5); }

    .doc-wrap { max-width: 780px; margin: 0 auto; padding: 32px 32px 64px; }

    /* markdown content styles */
    .doc-content h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; margin: 0 0 24px; color: var(--text); }
    .doc-content h2 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 600; margin: 36px 0 12px; color: var(--text); padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .doc-content h3 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin: 24px 0 8px; }
    .doc-content h4 { font-size: 13px; font-weight: 600; color: var(--text-muted); margin: 16px 0 6px; font-style: italic; }
    .doc-content p { line-height: 1.7; margin-bottom: 12px; color: var(--text); }
    .doc-content em { color: var(--text-muted); }
    .doc-content strong { color: var(--text); }
    .doc-content ul, .doc-content ol { padding-left: 1.4em; margin-bottom: 12px; line-height: 1.7; }
    .doc-content li { margin-bottom: 4px; }
    .doc-content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 16px 0; background: var(--accent-dim); border-radius: 0 4px 4px 0; color: var(--text-muted); font-style: italic; }
    .doc-content code { font-family: 'DM Mono', monospace; font-size: 12px; background: var(--surface2); padding: 1px 5px; border-radius: 3px; color: var(--accent); }
    .doc-content pre { background: #1e1710; border-radius: 6px; padding: 16px; overflow-x: auto; margin: 16px 0; }
    .doc-content pre code { background: none; color: #d4c4a0; padding: 0; font-size: 12px; }
    .doc-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
    .doc-content th { background: var(--surface2); font-weight: 600; text-align: left; padding: 8px 12px; border: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .doc-content td { padding: 8px 12px; border: 1px solid var(--border); vertical-align: top; line-height: 1.5; }
    .doc-content tr:nth-child(even) td { background: var(--surface); }
    .doc-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* frontmatter block — hide the raw --- yaml block */
    .doc-content > p:first-child:empty + hr { display: none; }
  </style>
</head>
<body>
<nav class="guild-nav">
  <div class="guild-nav-brand">
    <a href="/guild">GUILD</a>
    <span class="nav-sep">·</span>
    <a href="/guild/build/queue">BUILD</a>
  </div>
  <div class="guild-subnav">
    <a href="/guild/docs" class="subnav-back">← Docs</a>
    <span class="subnav-filename">docs/{{ filename }}</span>
    <div class="subnav-actions">
      {% if date %}<span class="date-badge">{{ date }}</span>{% endif %}
      <a href="{{ gh_url }}" target="_blank" class="gh-link">View on GitHub →</a>
    </div>
  </div>
</nav>

<div class="doc-wrap">
  <div class="doc-content">
    {{ content | safe }}
  </div>
</div>
</body>
</html>
