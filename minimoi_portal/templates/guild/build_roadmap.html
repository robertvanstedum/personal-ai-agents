<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap — Guild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/guild.css">
  <style>
    :root {
      --bg: #f5f0e8; --surface: #faf7f2; --surface2: #f0ebe0;
      --border: #ddd6c8; --text: #2a2418; --text-muted: #6b5f4e;
      --text-dim: #9e9080; --accent: #8b5e2a; --accent-dim: rgba(139,94,42,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    /* ── Guild nav ── */
    nav.guild-nav {
      position: sticky; top: 0; z-index: 100;
      background: #2a1f14;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .guild-nav-brand {
      height: 44px; display: flex; align-items: center;
      padding: 0 1.5rem;
      font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size); letter-spacing: 0.08em;
    }
    .guild-nav-brand a { color: #C68A5E; text-decoration: none; }
    .guild-nav-brand a:hover { color: #ffffff; }
    .guild-nav-brand a.nav-active { color: #ffffff; font-weight: 700; }
    .nav-sep { color: rgba(255,255,255,0.2); margin: 0 12px; }
    .guild-subnav {
      height: 36px; display: flex; align-items: center;
      padding: 0 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.15);
    }
    .subnav-back {
      font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size);
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(198,138,94,0.4); text-decoration: none;
      padding: 0 14px 0 0; height: 36px;
      display: flex; align-items: center;
      margin-right: 10px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .subnav-back:hover { color: rgba(198,138,94,0.75); }
    .subnav-link {
      font-family: 'DM Mono', monospace; font-size: var(--guild-nav-size);
      text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(198,138,94,0.7); text-decoration: none;
      padding: 0 12px; height: 36px;
      display: flex; align-items: center;
      border-bottom: 2px solid transparent;
    }
    .subnav-link:hover { color: #C68A5E; }
    .subnav-link.subnav-active { color: #C68A5E; border-bottom-color: #C68A5E; font-weight: 700; }
    .subnav-dot { color: rgba(198,138,94,0.3); font-size: 9px; }

    /* ── Page header ── */
    .page-header {
      padding: 24px 32px 0;
      display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    }
    .page-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 400; }
    .page-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); }

    /* ── Roadmap content area ── */
    .roadmap-wrap {
      padding: 8px 32px 48px;
    }

    /* Hide the h1 from markdown — page-header title replaces it */
    .roadmap-content h1 { display: none; }

    /* "How this works" collapsible */
    details.how-it-works {
      margin-bottom: 14px;
    }
    details.how-it-works summary {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 400;
      color: var(--text); cursor: pointer;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(139,94,42,0.2);
      list-style: none;
      display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    details.how-it-works summary::after {
      content: '▸';
      font-size: 10px; color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      margin-left: auto;
    }
    details.how-it-works[open] summary::after { content: '▾'; }
    details.how-it-works .details-body {
      padding: 10px 0 4px;
    }

    /* Domain section h2 — plain preamble style */
    .roadmap-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 400;
      color: var(--text); margin-top: 24px; margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(139,94,42,0.2);
    }
    .roadmap-content p {
      color: var(--text-muted); line-height: 1.65;
      margin-bottom: 10px; font-size: 13.5px;
    }
    .roadmap-content ul, .roadmap-content ol {
      padding-left: 20px; margin-bottom: 14px;
    }
    .roadmap-content li {
      color: var(--text-muted); line-height: 1.6;
      font-size: 13.5px; margin-bottom: 4px;
    }
    .roadmap-content li strong { color: var(--text); }
    .roadmap-content hr {
      border: none; border-top: 1px solid var(--border);
      margin: 6px 0 0;
    }
    .roadmap-content code {
      font-family: 'DM Mono', monospace; font-size: 11px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--accent);
    }
    .roadmap-content a { color: var(--accent); }
    .roadmap-content a:hover { text-decoration: underline; }

    /* ── Domain cards ── */
    .roadmap-domain {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 22px 14px;
      margin-bottom: 16px;
    }
    .roadmap-domain h2 {
      margin-top: 0;
      border-bottom-color: rgba(139,94,42,0.2);
    }
    .roadmap-domain hr { display: none; } /* hr inside cards = redundant */

    /* ── Tables ── */
    .roadmap-content table {
      width: 100%; border-collapse: collapse; margin-bottom: 14px;
    }
    .roadmap-content th {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted); font-weight: 600;
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    .roadmap-content td {
      font-size: 13px; color: var(--text-muted);
      padding: 8px 12px; border-bottom: 1px solid rgba(221,214,200,0.5);
      vertical-align: middle;
    }
    .roadmap-content tr:last-child td { border-bottom: none; }

    /* ── h3 variants (agreed / discussion) ── */
    .roadmap-content h3 {
      font-family: 'DM Mono', monospace;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
      margin-top: 16px; margin-bottom: 6px;
    }
    .roadmap-content h3.h3-agreed    { color: var(--text); opacity: 0.9; }
    .roadmap-content h3.h3-discussion { opacity: 0.55; }
    .roadmap-content h3.h3-discussion::before { content: '— '; font-style: italic; }

    /* ── Status badges ── */
    .status-badge {
      font-family: 'DM Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 3px; white-space: nowrap;
    }
    .status-target      { background: rgba(139,94,42,0.06); color: var(--text-muted); }
    .status-queued      { background: rgba(139,94,42,0.15); color: var(--accent); }
    .status-in-progress { background: rgba(90,138,90,0.12); color: #4a7a4a; }
    .status-done        { background: var(--surface2); color: var(--text-dim); text-decoration: line-through; }

    /* ── Parent rows (initiative header) ── */
    .roadmap-content tr.row-parent td {
      background: rgba(198,138,94,0.06);
      border-bottom: 1px solid var(--border);
    }
    .roadmap-content tr.row-parent td strong { color: var(--text); font-size: 13px; font-weight: 600; }

    /* ── Child rows (phase detail) ── */
    .roadmap-content tr.row-child td:first-child {
      padding-left: 2rem;
      opacity: 0.8;
      font-size: 12.5px;
    }
    .roadmap-content tr.row-child td { border-bottom-color: rgba(221,214,200,0.3); }

    /* ── Status-driven left border (scan signal) ── */
    .roadmap-content tr.row-in_progress td:first-child {
      border-left: 3px solid rgba(90,138,90,0.6);
      padding-left: calc(12px - 3px);
    }
    .roadmap-content tr.row-child.row-in_progress td:first-child {
      padding-left: calc(2rem - 3px);
    }
    .roadmap-content tr.row-queued td:first-child {
      border-left: 2px solid rgba(139,94,42,0.5);
      padding-left: calc(12px - 2px);
    }
    .roadmap-content tr.row-child.row-queued td:first-child {
      padding-left: calc(2rem - 2px);
    }
    .roadmap-content tr.row-in_progress td,
    .roadmap-content tr.row-queued td { color: var(--text); }
    .roadmap-content tr.row-done td   { opacity: 0.55; }
  </style>
</head>
<body>

<nav class="guild-nav">
  <div class="guild-nav-brand">
    <a href="/dashboard">mini-moi</a>
    <span class="nav-sep">|</span>
    <a href="/app/curator">Curator</a>
    <span class="nav-sep">|</span>
    <a href="/app/german">German</a>
    <span class="nav-sep">|</span>
    <a href="/guild" class="nav-active">Guild</a>
  </div>
  <div class="guild-subnav">
    <a href="/guild" class="subnav-back">← Guild</a>
    <a href="/guild/build/queue" class="subnav-link">Queue</a>
    <span class="subnav-dot">&nbsp;·&nbsp;</span>
    <a href="/guild/build" class="subnav-link">Build Log</a>
    <span class="subnav-dot">&nbsp;·&nbsp;</span>
    <a href="/guild/build/roadmap" class="subnav-link subnav-active">Roadmap</a>
    <span class="subnav-dot">&nbsp;·&nbsp;</span>
    <a href="/guild/docs" class="subnav-link">Docs</a>
  </div>
</nav>

<div class="page-header" style="padding-bottom: 12px;">
  <h1 class="page-title">mini-moi Roadmap</h1>
  <span class="page-meta">Read-only · edit in _working/ROADMAP.md{% if last_modified %} · {{ last_modified }}{% endif %}</span>
</div>

<div class="roadmap-wrap">
  <div class="roadmap-content">
    {{ content | safe }}
  </div>
</div>

</body>
</html>
