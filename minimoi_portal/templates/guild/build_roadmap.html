<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap — Guild</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --surface: #faf7f2; --surface2: #f0ebe0;
      --border: #ddd6c8; --text: #2a2418; --text-muted: #6b5f4e;
      --text-dim: #9e9080; --accent: #8b5e2a; --accent-dim: rgba(139,94,42,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

    /* ── Guild nav ── */
    nav.guild-nav {
      position: sticky; top: 0; z-index: 100;
      background: #2a1f14;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .guild-nav-brand {
      height: 44px; display: flex; align-items: center;
      padding: 0 1.5rem;
      font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    }
    .guild-nav-brand a { color: #C68A5E; text-decoration: none; }
    .guild-nav-brand a:hover { color: #ffffff; }
    .guild-nav-brand a.nav-active { color: #ffffff; font-weight: 600; }
    .nav-sep { color: rgba(255,255,255,0.2); margin: 0 12px; }
    .guild-subnav {
      height: 36px; display: flex; align-items: center;
      padding: 0 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.15);
    }
    .subnav-back {
      font-family: 'DM Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: rgba(198,138,94,0.4); text-decoration: none;
      padding: 0 14px 0 0; height: 36px;
      display: flex; align-items: center;
      margin-right: 10px;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    .subnav-back:hover { color: rgba(198,138,94,0.75); }
    .subnav-link {
      font-family: 'DM Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: rgba(198,138,94,0.7); text-decoration: none;
      padding: 0 12px; height: 36px;
      display: flex; align-items: center;
      border-bottom: 2px solid transparent;
    }
    .subnav-link:hover { color: #C68A5E; }
    .subnav-link.subnav-active { color: #C68A5E; border-bottom-color: #C68A5E; }
    .subnav-dot { color: rgba(198,138,94,0.3); font-size: 9px; }

    /* ── Markdown content ── */
    .roadmap-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 40px 72px;
    }

    .roadmap-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem; font-weight: 400;
      color: var(--text); margin-bottom: 6px;
    }
    .roadmap-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 400;
      color: var(--text); margin-top: 36px; margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .roadmap-content h3 {
      font-family: 'DM Mono', monospace;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); font-weight: 600;
      margin-top: 20px; margin-bottom: 8px;
    }
    .roadmap-content p {
      color: var(--text-muted); line-height: 1.65;
      margin-bottom: 12px; font-size: 13.5px;
    }
    .roadmap-content ul, .roadmap-content ol {
      padding-left: 20px; margin-bottom: 14px;
    }
    .roadmap-content li {
      color: var(--text-muted); line-height: 1.6;
      font-size: 13.5px; margin-bottom: 5px;
    }
    .roadmap-content li strong { color: var(--text); }
    .roadmap-content code {
      font-family: 'DM Mono', monospace; font-size: 11px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--accent);
    }
    .roadmap-content pre {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; padding: 14px 16px;
      overflow-x: auto; margin-bottom: 16px;
    }
    .roadmap-content pre code {
      background: none; border: none; padding: 0;
      font-size: 11px; color: var(--text-muted);
    }
    .roadmap-content blockquote {
      border-left: 3px solid rgba(139,94,42,0.3);
      padding: 6px 16px; margin: 14px 0;
      color: var(--text-dim); font-style: italic;
    }
    .roadmap-content hr {
      border: none; border-top: 1px solid var(--border);
      margin: 28px 0;
    }
    .roadmap-content a { color: var(--accent); }
    .roadmap-content a:hover { text-decoration: underline; }
    .roadmap-content table {
      width: 100%; border-collapse: collapse; margin-bottom: 16px;
    }
    .roadmap-content th {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted); font-weight: 600;
      padding: 8px 12px; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    .roadmap-content td {
      font-size: 13px; color: var(--text-muted);
      padding: 8px 12px; border-bottom: 1px solid rgba(221,214,200,0.5);
    }
    .roadmap-content tr:last-child td { border-bottom: none; }

    /* read-only notice */
    .readonly-notice {
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-dim);
      margin-bottom: 28px;
    }
  </style>
</head>
<body>

<nav class="guild-nav">
  <div class="guild-nav-brand">
    <a href="/dashboard">mini-moi</a>
    <span class="nav-sep">|</span>
    <a href="/app/curator">Curator</a>
    <span class="nav-sep">|</span>
    <a href="/app/german">German</a>
    <span class="nav-sep">|</span>
    <a href="/guild" class="nav-active">Guild</a>
  </div>
  <div class="guild-subnav">
    <a href="/guild" class="subnav-back">← Guild</a>
    <a href="/guild/build" class="subnav-link">Build Log</a>
    <span class="subnav-dot">&nbsp;·&nbsp;</span>
    <a href="/guild/build/queue" class="subnav-link">Queue</a>
    <span class="subnav-dot">&nbsp;·&nbsp;</span>
    <a href="/guild/build/roadmap" class="subnav-link subnav-active">Roadmap</a>
  </div>
</nav>

<div class="roadmap-wrap">
  <p class="readonly-notice">Read-only · edit in _working/ROADMAP_2026-06-12.md</p>
  <div class="roadmap-content">
    {{ content | safe }}
  </div>
</div>

</body>
</html>
