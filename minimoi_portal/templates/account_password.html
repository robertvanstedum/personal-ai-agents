<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — mini-moi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/portal.css">
</head>
<body class="admin">

<nav class="portal-nav">
  <a href="/" class="portal-nav-brand">mini-moi</a>
  <div class="portal-nav-links">
    <a href="javascript:history.back()" class="nav-link">← Back</a>
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <a href="/logout" class="nav-link">Sign out</a>
  </div>
</nav>

<main class="admin-main">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <h1 class="admin-title">Change Password</h1>

  <section class="admin-section">
    <form method="POST" action="/account/password"
          onsubmit="return document.getElementById('pw').value === document.getElementById('pw2').value || (alert('New passwords do not match.'), false)">
      <div class="form-row">
        <div class="form-group">
          <label for="current_password">Current password</label>
          <input type="password" id="current_password" name="current_password" required autofocus>
        </div>
        <div class="form-group">
          <label for="pw">New password</label>
          <input type="password" id="pw" name="password" minlength="8" required>
        </div>
        <div class="form-group">
          <label for="pw2">Confirm new password</label>
          <input type="password" id="pw2" name="confirm" minlength="8" required>
        </div>
      </div>
      <button type="submit" class="btn-primary">Update password →</button>
    </form>
  </section>

</main>

</body>
</html>
