<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — mini-moi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/portal.css">
</head>
<body class="login">

<nav class="portal-nav">
  <a href="/" class="portal-nav-brand">mini-moi</a>
</nav>

<main class="login-main">
  <div class="login-card">
    <h1 class="login-title">Sign in</h1>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               autocomplete="username" autocapitalize="none"
               autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary btn-full">Sign in →</button>
    </form>

    <p class="login-footer">
      <a href="/">← Back</a>
    </p>
  </div>
</main>

</body>
</html>
