<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — mini-moi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/portal.css">
</head>
<body class="login">

<nav class="portal-nav">
  <a href="/" class="portal-nav-brand">mini-moi</a>
</nav>

<main class="login-main">
  <div class="login-card">
    <h1 class="login-title">Forgot password</h1>

    {% if submitted %}
      <p style="color:var(--text-muted);line-height:1.6;margin-bottom:1.5rem;">
        If that email is registered, Robert will send you a temporary password shortly.
      </p>
      <p class="login-footer"><a href="/login">← Back to sign in</a></p>
    {% else %}
      <p style="color:var(--text-muted);line-height:1.6;margin-bottom:1.5rem;">
        Enter your email address and Robert will send you a temporary password.
      </p>
      <form method="POST" action="/forgot-password">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email"
                 autocomplete="email" autocapitalize="none"
                 autofocus required>
        </div>
        <button type="submit" class="btn-primary btn-full">Send reset request →</button>
      </form>
      <p class="login-footer"><a href="/login">← Back to sign in</a></p>
    {% endif %}
  </div>
</main>

</body>
</html>
