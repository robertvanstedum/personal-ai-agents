<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get access — mini-moi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/portal.css">
</head>
<body class="login">

<nav class="portal-nav">
  <a href="/" class="portal-nav-brand">mini-moi</a>
</nav>

<main class="login-main">
  <div class="login-card">
    <h1 class="login-title">Get guest access</h1>
    <p class="login-subtitle">Try the Curator briefing and Mein Deutsch. Guest access is active for 30 days.</p>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="form-group">
        <label for="display_name">Your name</label>
        <input type="text" id="display_name" name="display_name"
               placeholder="e.g. Jane Smith"
               autocomplete="name" autofocus required>
      </div>
      <div class="form-group">
        <label for="password">Choose a password</label>
        <input type="password" id="password" name="password"
               autocomplete="new-password"
               placeholder="At least 6 characters" required>
      </div>
      <button type="submit" class="btn-primary btn-full">Create guest account →</button>
    </form>

    <p class="login-footer">
      Already have an account? <a href="/login">Sign in</a>
    </p>
  </div>
</main>

</body>
</html>
