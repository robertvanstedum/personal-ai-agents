<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Português{% endblock %} — meu português</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/portuguese.css?v=12">
  {% block head %}{% endblock %}
</head>
<body class="{{ active }}-mode">

<nav>
  <a href="/" class="logo">meu português</a>
  <ul class="nav-links">
    <li><a href="/leitura"   {% if active=='leitura' %}class="active"{% endif %} title="Leitura">Leitura</a></li>
    <li><a href="/conversas" {% if active=='conversas' %}class="active"{% endif %} title="Conversas">Conversas</a></li>
    <li><a href="/escrita"   {% if active=='escrita' %}class="active"{% endif %} title="Escrita">Escrita</a></li>
    <li><a href="/palavras"  {% if active=='palavras' %}class="active"{% endif %} title="Palavras">Palavras</a></li>
    <li><a href="/arquivo"   {% if active=='arquivo' %}class="active"{% endif %} title="Arquivo">Arquivo</a></li>
    <li><a href="/admin"     {% if active=='admin' %}class="active"{% endif %} title="Admin">Admin</a></li>
  </ul>
  {% if tip %}<button class="nav-tip" id="navTip" aria-label="Dica" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z"/></svg><span class="nav-tip-popover">{{ tip }}</span></button>{% endif %}
</nav>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var t = document.getElementById('navTip');
  if (!t) return;
  t.addEventListener('click', function(e) { e.stopPropagation(); t.classList.toggle('tip-open'); });
  document.addEventListener('click', function() { t.classList.remove('tip-open'); });
});
</script>

{% block page_strip %}{% endblock %}

<main class="page">
  {% block content %}{% endblock %}
</main>

{% block page_footer %}{% endblock %}

<script>
(function() {
  var saved = document.cookie.match(/pt_palette=(\d)/);
  var active = saved ? saved[1] : '2';
  document.body.setAttribute('data-palette', active);
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
