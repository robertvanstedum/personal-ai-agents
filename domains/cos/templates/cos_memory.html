<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoS Memory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #1a1a1a;
      color: #e8e2d4;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 12px;
    }
    header h1 {
      font-size: 1rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #b8a98a;
      margin: 0;
    }
    header a {
      font-size: 0.8rem;
      color: #665a46;
      text-decoration: none;
    }
    header a:hover { color: #b8a98a; }
    .meta {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }
    pre {
      background: #111;
      border: 1px solid #333;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      color: #c8c0b0;
      max-width: 820px;
    }
    .scope-note {
      margin-top: 12px;
      font-size: 0.72rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>CoS Memory</h1>
    <a href="/ui">← Back to Talk</a>
  </header>
  <p class="meta">{{ memory_chars }} chars / 7,500 cap &nbsp;·&nbsp; read-only dump of cos_memory.md &nbsp;·&nbsp; refreshes on page load</p>
  <pre>{{ memory }}</pre>
  <p class="scope-note">Phase A — raw file view. Feed tab (Phase B) will render this as structured entries.</p>
</body>
</html>
