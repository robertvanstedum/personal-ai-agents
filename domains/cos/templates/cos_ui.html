<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chief of Staff</title>
  <link rel="stylesheet" href="/static/cos.css">
</head>
<body>

  <!-- ── Sticky dark header ── -->
  <header class="cos-header">
    <div class="header-nav">
      <span class="brand">Chief of Staff</span>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="talk">Talk</button>
        <button class="tab-btn" data-tab="feed">Feed</button>
        <button class="tab-btn" data-tab="todo">To-do</button>
        <button class="tab-btn" data-tab="archive">Archive</button>
      </nav>
      <div class="backend-badge" id="backend-badge">···</div>
    </div>
  </header>

  <!-- ── Chicago photo banner ── -->
  <!-- Phase B: drop chicago_header.jpg into domains/cos/static/photos/ -->
  <div class="photo-banner">
    <span class="photo-caption">Chicago</span>
  </div>

  <div class="cos-main">

    <!-- ── Talk tab ── -->
    <div id="tab-talk" class="tab-panel active">
      <div id="chat-log"></div>
      <div class="input-row">
        <input id="send-input" type="text" placeholder="Message CoS…" autocomplete="off" autofocus>
        <button id="btn-voice" title="Voice input (Whisper)">🎙</button>
        <button id="btn-send">Send</button>
      </div>
      <div class="talk-meta">
        <span>localhost only · no auth · Phase A</span>
        <a href="/ui/memory" target="_blank">memory ↗</a>
        <span id="voice-status"></span>
      </div>
    </div>

    <!-- ── Feed tab ── -->
    <div id="tab-feed" class="tab-panel">
      <div id="feed-content" class="loading">Loading…</div>
    </div>

    <!-- ── To-do tab ── -->
    <div id="tab-todo" class="tab-panel">
      <div id="todo-content" class="loading">Loading…</div>
    </div>

    <!-- ── Archive tab ── -->
    <div id="tab-archive" class="tab-panel">
      <div id="archive-content" class="loading">Loading…</div>
    </div>

  </div><!-- .cos-main -->

<script>
// ── Tab switching ─────────────────────────────────────────────────────────────
const tabBtns    = document.querySelectorAll('.tab-btn');
const tabPanels  = document.querySelectorAll('.tab-panel');
const tabLoaded  = { talk: true, feed: false, todo: false, archive: false };

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    tabBtns.forEach(b => b.classList.remove('active'));
    tabPanels.forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('tab-' + tab).classList.add('active');
    if (!tabLoaded[tab]) {
      tabLoaded[tab] = true;
      loadTab(tab);
    }
  });
});

// ── Backend badge ─────────────────────────────────────────────────────────────
async function loadBackendBadge() {
  try {
    const d = await fetch('/status').then(r => r.json());
    const badge = document.getElementById('backend-badge');
    const bl = d.backend_label || '';
    const ml = d.model_label   || '';
    badge.textContent = ml ? `${bl} · ${ml}` : bl || '···';
  } catch(_) {}
}
loadBackendBadge();

// ── Chat log ──────────────────────────────────────────────────────────────────
const chatLog = document.getElementById('chat-log');

function appendMsg(role, text) {
  const wrap  = document.createElement('div');
  wrap.className = 'msg msg-' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'CoS';
  const body  = document.createElement('div');
  body.className = 'msg-text';
  body.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(body);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function appendThinking() {
  const el = document.createElement('div');
  el.className = 'msg-thinking';
  el.textContent = 'Thinking…';
  chatLog.appendChild(el);
  chatLog.scrollTop = chatLog.scrollHeight;
  return el;
}

// ── Send message ─────────────────────────────────────────────────────────────
const sendInput = document.getElementById('send-input');
const btnSend   = document.getElementById('btn-send');

document.getElementById('send-input').form;
document.querySelector('.input-row').addEventListener('submit', e => e.preventDefault());
btnSend.addEventListener('click', sendMessage);
sendInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

async function sendMessage() {
  const text = sendInput.value.trim();
  if (!text) return;
  sendInput.value = '';
  setInputDisabled(true);
  appendMsg('user', text);
  const thinking = appendThinking();
  try {
    const resp = await fetch('/ui/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();
    thinking.remove();
    appendMsg('cos', data.reply || '(empty reply)');
  } catch(err) {
    thinking.remove();
    appendMsg('cos', 'Error: ' + err.message);
  } finally {
    setInputDisabled(false);
    sendInput.focus();
  }
}

function setInputDisabled(disabled) {
  sendInput.disabled = disabled;
  btnSend.disabled   = disabled;
}

// ── Voice input (MediaRecorder + VAD, ported from German domain) ──────────────
const btnVoice    = document.getElementById('btn-voice');
const voiceStatus = document.getElementById('voice-status');
let   isRecording = false;

btnVoice.addEventListener('click', toggleVoice);

async function toggleVoice() {
  if (isRecording) return; // VAD handles stop automatically
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    voiceStatus.textContent = 'Microphone not available in this browser.';
    return;
  }
  btnVoice.classList.add('recording');
  btnVoice.title = 'Recording… speak, then pause';
  isRecording = true;
  voiceStatus.textContent = 'Listening…';

  const blob = await captureWithVAD();

  btnVoice.classList.remove('recording');
  btnVoice.title = 'Voice input (Whisper)';
  isRecording = false;

  if (!blob) {
    voiceStatus.textContent = '';
    return;
  }

  voiceStatus.textContent = 'Transcribing…';
  try {
    const fd = new FormData();
    fd.append('audio', blob, 'audio.webm');
    const resp = await fetch('/ui/transcribe', { method: 'POST', body: fd });
    const data = await resp.json();
    if (data.error) {
      voiceStatus.textContent = 'Transcription error: ' + data.error;
      return;
    }
    const t = (data.transcript || '').trim();
    if (t) {
      sendInput.value = t;
      voiceStatus.textContent = '';
      sendMessage();
    } else {
      voiceStatus.textContent = 'No speech detected.';
    }
  } catch(err) {
    voiceStatus.textContent = 'Transcription failed: ' + err.message;
  }
}

// VAD: records until 2 s of silence after ≥300 ms of speech
async function captureWithVAD() {
  const SPEECH_RMS  = 0.018;
  const SILENCE_RMS = 0.012;
  const SPEECH_MIN  = 300;
  const SILENCE_MS  = 2000;

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';
  const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume().catch(() => {});
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  const pcmData = new Float32Array(analyser.fftSize);

  return new Promise(resolve => {
    let speechStart = null, silenceFrom = null, recording = false, done = false;

    function finish(blob) {
      if (done) return;
      done = true;
      clearInterval(vad);
      if (recorder.state !== 'inactive') {
        recorder.onstop = () => resolve(blob || new Blob(chunks, { type: mimeType || 'audio/webm' }));
        recorder.stop();
      } else {
        resolve(blob);
      }
      audioCtx.close();
      stream.getTracks().forEach(t => t.stop());
    }

    recorder.start(100);

    const vad = setInterval(() => {
      analyser.getFloatTimeDomainData(pcmData);
      let sum = 0;
      for (let i = 0; i < pcmData.length; i++) sum += pcmData[i] * pcmData[i];
      const rms = Math.sqrt(sum / pcmData.length);

      if (rms >= SPEECH_RMS) {
        if (!speechStart) speechStart = Date.now();
        silenceFrom = null;
        if (!recording && Date.now() - speechStart >= SPEECH_MIN) {
          recording = true;
        }
      } else if (rms < SILENCE_RMS) {
        if (recording && !silenceFrom) silenceFrom = Date.now();
        if (recording && silenceFrom && Date.now() - silenceFrom >= SILENCE_MS) {
          finish(null); // resolve with chunks collected so far
        }
        if (!speechStart && !recording) {
          // Prevent indefinite waiting if no speech at all (30 s timeout)
        }
      }
    }, 50);

    // Safety timeout: 30 s max
    setTimeout(() => finish(null), 30000);
  });
}

// ── Feed tab ──────────────────────────────────────────────────────────────────
async function loadFeed() {
  const el = document.getElementById('feed-content');
  try {
    const entries = await fetch('/ui/feed').then(r => r.json());
    if (!entries.length) {
      el.innerHTML = '<p class="empty-state">No memory entries yet — start chatting and CoS will begin writing notes.</p>';
      return;
    }

    // Group by section
    const sections = {};
    entries.forEach(e => {
      const sec = e.section || 'General';
      if (!sections[sec]) sections[sec] = [];
      sections[sec].push(e);
    });

    let html = '';
    for (const [sec, items] of Object.entries(sections)) {
      html += `<div class="section-divider">${esc(sec)}</div>`;
      items.forEach(e => {
        const tag = e.type || 'chat';
        html += `
        <div class="entry-card">
          <div class="entry-meta">
            <span class="entry-tag ${esc(tag)}">${esc(tag)}</span>
            <span class="entry-date">${esc(e.date || '')}</span>
          </div>
          <div class="entry-content">${esc(e.content)}</div>
        </div>`;
      });
    }
    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = `<p class="empty-state">Feed unavailable: ${esc(err.message)}</p>`;
  }
}

// ── To-do tab ─────────────────────────────────────────────────────────────────
async function loadTodo() {
  const el = document.getElementById('todo-content');
  try {
    const data = await fetch('/ui/todo').then(r => r.json());
    const agenda = data.agenda || [];
    const memActs = data.memory_actions || [];
    let html = '';

    if (agenda.length) {
      html += '<div class="todo-section-title">From CoS recommendations</div>';
      agenda.forEach(item => {
        const conf = item.confidence ? ` · ${Math.round(item.confidence * 100)}% confidence` : '';
        html += `
        <div class="todo-item">
          <div class="todo-dot"></div>
          <div class="todo-body">
            <div class="todo-content">${esc(item.description || '')}</div>
            <div class="todo-source">${esc(item.domain || 'cos')}${conf} · ${esc((item.created_at || '').slice(0,10))}</div>
          </div>
        </div>`;
      });
    }

    if (memActs.length) {
      html += '<div class="todo-section-title">From memory</div>';
      memActs.forEach(e => {
        html += `
        <div class="todo-item">
          <div class="todo-dot"></div>
          <div class="todo-body">
            <div class="todo-content">${esc(e.content || '')}</div>
            <div class="todo-source">${esc(e.type)} · ${esc(e.date || '')}</div>
          </div>
        </div>`;
      });
    }

    if (!agenda.length && !memActs.length) {
      html = '<p class="empty-state">No open action items. CoS will surface them here as it identifies things worth following up on.</p>';
    }

    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = `<p class="empty-state">To-do unavailable: ${esc(err.message)}</p>`;
  }
}

// ── Archive tab ───────────────────────────────────────────────────────────────
async function loadArchive() {
  const el = document.getElementById('archive-content');
  try {
    const files = await fetch('/ui/archive').then(r => r.json());
    if (!files.length) {
      el.innerHTML = '<p class="empty-state">No agent log files yet. Logs from each agent session will appear here.</p>';
      return;
    }

    // Group by dir
    const groups = {};
    files.forEach(f => {
      if (!groups[f.dir]) groups[f.dir] = [];
      groups[f.dir].push(f);
    });

    let html = '';
    for (const [dir, items] of Object.entries(groups)) {
      html += `<div class="archive-group">
        <div class="archive-group-title">${esc(dir)}</div>`;
      items.forEach(f => {
        const kb = (f.size / 1024).toFixed(1);
        html += `<div class="archive-row">
          <span class="archive-name">${esc(f.name)}</span>
          <span class="archive-meta">${esc(f.mtime)} · ${kb} KB</span>
        </div>`;
      });
      html += '</div>';
    }
    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = `<p class="empty-state">Archive unavailable: ${esc(err.message)}</p>`;
  }
}

// ── Tab loader dispatch ───────────────────────────────────────────────────────
function loadTab(tab) {
  if (tab === 'feed')    loadFeed();
  if (tab === 'todo')    loadTodo();
  if (tab === 'archive') loadArchive();
}

// ── Escape helper ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
