<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chief of Staff</title>
  <link rel="stylesheet" href="/static/cos.css?v=2">
</head>
<body>

  <!-- ── Sticky dark header ── -->
  <header class="cos-header">
    <div class="header-nav">
      <a href="/ui" class="brand">Chief of Staff</a>
      <nav class="tab-nav">
        <button class="tab-btn" data-tab="confer">Confer</button>
        <button class="tab-btn" data-tab="record">Record</button>
        <button class="tab-btn" data-tab="agenda">Agenda</button>
        <button class="tab-btn" data-tab="store">Store</button>
      </nav>
      <span class="dev-badge">IN BUILD</span>
      <div class="backend-badge" id="backend-badge">···</div>
    </div>
  </header>

  <!-- ── Two-column split: content left, photo right ── -->
  <div class="tab-layout-split">

    <!-- ── Left: tab content panels ── -->
    <div class="tab-content">

      <!-- Confer -->
      <div id="tab-confer" class="tab-panel">
        <div class="tab-split-header">
          <div class="tab-hero-label">[CHICAGO]</div>
          <h1>Confer</h1>
        </div>
        <div id="chat-log"></div>
        <div class="input-row">
          <input id="send-input" type="text" placeholder="Message CoS…" autocomplete="off" autofocus>
          <button id="btn-voice" title="Voice input (Whisper)">🎙</button>
          <button id="btn-send">Send</button>
        </div>
        <div class="talk-meta">
          <span id="voice-status"></span>
          <a href="/ui/memory" target="_blank">memory ↗</a>
        </div>
      </div>

      <!-- Record -->
      <div id="tab-record" class="tab-panel">
        <div class="tab-split-header">
          <div class="tab-hero-label">[CHICAGO]</div>
          <h1>Record</h1>
        </div>
        <div id="notes-content" class="loading">Loading…</div>
      </div>

      <!-- Agenda -->
      <div id="tab-agenda" class="tab-panel">
        <div class="tab-split-header">
          <div class="tab-hero-label">[CHICAGO]</div>
          <h1>Agenda</h1>
        </div>
        <div id="todo-content" class="loading">Loading…</div>
      </div>

      <!-- Store -->
      <div id="tab-store" class="tab-panel">
        <div class="tab-split-header">
          <div class="tab-hero-label">[CHICAGO]</div>
          <h1>Store</h1>
        </div>
        <div id="repository-content" class="loading">Loading…</div>
      </div>

    </div><!-- .tab-content -->

    <!-- ── Right: sidebar photos (all pre-loaded, JS shows active) ── -->
    <div class="tab-panel-photo">
      <img src="/static/photos/cos_discuss.jpg"    class="tab-photo" data-tab="confer"  style="object-position:center 30%" alt="">
      <img src="/static/photos/cos_notes.jpg"      class="tab-photo" data-tab="record"  style="object-position:center center" alt="">
      <img src="/static/photos/cos_todo.jpg"       class="tab-photo" data-tab="agenda"  style="object-position:center 40%" alt="">
      <img src="/static/photos/cos_repository.jpg" class="tab-photo" data-tab="store"   style="object-position:center center" alt="">
    </div>

  </div><!-- .tab-layout-split -->

<script>
const INITIAL_TAB = '{{ initial_tab }}';

// ── Tab switching ─────────────────────────────────────────────────────────────
const tabBtns   = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-panel');
const tabPhotos = document.querySelectorAll('.tab-photo');
const tabLoaded = { confer: true, record: false, agenda: false, store: false };

function activateTab(tab, pushState) {
  tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  tabPanels.forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
  tabPhotos.forEach(img => img.classList.toggle('active', img.dataset.tab === tab));
  if (pushState) history.pushState({tab}, '', tab);
  if (!tabLoaded[tab]) { tabLoaded[tab] = true; loadTab(tab); }
}

tabBtns.forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab, true));
});

window.addEventListener('popstate', e => {
  const tab = (e.state && e.state.tab) || 'confer';
  activateTab(tab, false);
});

// ── Backend badge ─────────────────────────────────────────────────────────────
async function loadBackendBadge() {
  try {
    const d = await fetch('/status').then(r => r.json());
    const badge = document.getElementById('backend-badge');
    const bl = d.backend_label || '';
    const ml = d.model_label   || '';
    badge.textContent = ml ? `${bl} · ${ml}` : bl || '···';
  } catch(_) {}
}
loadBackendBadge();

// ── Chat (Discuss tab) ────────────────────────────────────────────────────────
const chatLog   = document.getElementById('chat-log');
const sendInput = document.getElementById('send-input');
const btnSend   = document.getElementById('btn-send');

function appendMsg(role, text) {
  const wrap  = document.createElement('div');
  wrap.className = 'msg msg-' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'CoS';
  const body  = document.createElement('div');
  body.className = 'msg-text';
  body.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(body);
  chatLog.appendChild(wrap);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function appendThinking() {
  const el = document.createElement('div');
  el.className = 'msg-thinking';
  el.textContent = 'Thinking…';
  chatLog.appendChild(el);
  chatLog.scrollTop = chatLog.scrollHeight;
  return el;
}

btnSend.addEventListener('click', sendMessage);
sendInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

async function sendMessage() {
  const text = sendInput.value.trim();
  if (!text) return;
  sendInput.value = '';
  setInputDisabled(true);
  appendMsg('user', text);
  const thinking = appendThinking();
  try {
    const resp = await fetch('/ui/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();
    thinking.remove();
    appendMsg('cos', data.reply || '(empty reply)');
  } catch(err) {
    thinking.remove();
    appendMsg('cos', 'Error: ' + err.message);
  } finally {
    setInputDisabled(false);
    sendInput.focus();
  }
}

function setInputDisabled(disabled) {
  sendInput.disabled = disabled;
  btnSend.disabled   = disabled;
}

// ── Voice input (VAD + Whisper) ───────────────────────────────────────────────
const btnVoice    = document.getElementById('btn-voice');
const voiceStatus = document.getElementById('voice-status');
let   isRecording = false;

btnVoice.addEventListener('click', toggleVoice);

async function toggleVoice() {
  if (isRecording) return;
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    voiceStatus.textContent = 'Microphone not available in this browser.';
    return;
  }
  btnVoice.classList.add('recording');
  btnVoice.title = 'Recording… speak, then pause';
  isRecording = true;
  voiceStatus.textContent = 'Listening…';

  const blob = await captureWithVAD();

  btnVoice.classList.remove('recording');
  btnVoice.title = 'Voice input (Whisper)';
  isRecording = false;

  if (!blob) { voiceStatus.textContent = ''; return; }

  voiceStatus.textContent = 'Transcribing…';
  try {
    const fd = new FormData();
    fd.append('audio', blob, 'audio.webm');
    const resp = await fetch('/ui/transcribe', { method: 'POST', body: fd });
    const data = await resp.json();
    if (data.error) { voiceStatus.textContent = 'Transcription error: ' + data.error; return; }
    const t = (data.transcript || '').trim();
    if (t) { sendInput.value = t; voiceStatus.textContent = ''; sendMessage(); }
    else { voiceStatus.textContent = 'No speech detected.'; }
  } catch(err) {
    voiceStatus.textContent = 'Transcription failed: ' + err.message;
  }
}

async function captureWithVAD() {
  const SPEECH_RMS = 0.018, SILENCE_RMS = 0.012, SPEECH_MIN = 300, SILENCE_MS = 2000;
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';
  const recorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume().catch(() => {});
  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  const pcmData = new Float32Array(analyser.fftSize);
  return new Promise(resolve => {
    let speechStart = null, silenceFrom = null, recording = false, done = false;
    function finish() {
      if (done) return; done = true; clearInterval(vad);
      if (recorder.state !== 'inactive') {
        recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType || 'audio/webm' }));
        recorder.stop();
      } else { resolve(null); }
      audioCtx.close(); stream.getTracks().forEach(t => t.stop());
    }
    recorder.start(100);
    const vad = setInterval(() => {
      analyser.getFloatTimeDomainData(pcmData);
      let sum = 0;
      for (let i = 0; i < pcmData.length; i++) sum += pcmData[i] * pcmData[i];
      const rms = Math.sqrt(sum / pcmData.length);
      if (rms >= SPEECH_RMS) {
        if (!speechStart) speechStart = Date.now();
        silenceFrom = null;
        if (!recording && Date.now() - speechStart >= SPEECH_MIN) recording = true;
      } else if (rms < SILENCE_RMS) {
        if (recording && !silenceFrom) silenceFrom = Date.now();
        if (recording && silenceFrom && Date.now() - silenceFrom >= SILENCE_MS) finish();
      }
    }, 50);
    setTimeout(finish, 30000);
  });
}

// ── Notes tab ─────────────────────────────────────────────────────────────────
async function loadNotes() {
  const el = document.getElementById('notes-content');
  try {
    const entries = await fetch('/ui/api/notes').then(r => r.json());
    if (!entries.length) {
      el.innerHTML = '<p class="empty-state">No memory entries yet.</p>';
      return;
    }
    const sections = {};
    entries.forEach(e => {
      const sec = e.section || 'General';
      if (!sections[sec]) sections[sec] = [];
      sections[sec].push(e);
    });
    let html = '';
    for (const [sec, items] of Object.entries(sections)) {
      html += `<div class="section-divider">${esc(sec)}</div>`;
      items.forEach(e => {
        const tag = e.type || 'chat';
        html += `<div class="entry-card">
          <div class="entry-meta">
            <span class="entry-tag ${esc(tag)}">${esc(tag)}</span>
            <span class="entry-date">${esc(e.date || '')}</span>
          </div>
          <div class="entry-content">${esc(e.content)}</div>
        </div>`;
      });
    }
    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = `<p class="empty-state">Notes unavailable: ${esc(err.message)}</p>`;
  }
}

// ── To-do tab ─────────────────────────────────────────────────────────────────
async function loadTodo() {
  const el = document.getElementById('todo-content');
  try {
    const data = await fetch('/ui/api/todo').then(r => r.json());
    const agenda = data.agenda || [], memActs = data.memory_actions || [];
    let html = '';
    if (agenda.length) {
      html += '<div class="todo-section-title">From CoS recommendations</div>';
      agenda.forEach(item => {
        const conf = item.confidence ? ` · ${Math.round(item.confidence * 100)}% confidence` : '';
        html += `<div class="todo-item">
          <div class="todo-dot"></div>
          <div class="todo-body">
            <div class="todo-content">${esc(item.description || '')}</div>
            <div class="todo-source">${esc(item.domain || 'cos')}${conf} · ${esc((item.created_at || '').slice(0,10))}</div>
          </div>
        </div>`;
      });
    }
    if (memActs.length) {
      html += '<div class="todo-section-title">From memory</div>';
      memActs.forEach(e => {
        html += `<div class="todo-item">
          <div class="todo-dot"></div>
          <div class="todo-body">
            <div class="todo-content">${esc(e.content || '')}</div>
            <div class="todo-source">${esc(e.type)} · ${esc(e.date || '')}</div>
          </div>
        </div>`;
      });
    }
    if (!agenda.length && !memActs.length) {
      html = '<p class="empty-state">No open action items.</p>';
    }
    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = `<p class="empty-state">To-do unavailable: ${esc(err.message)}</p>`;
  }
}

// ── Repository tab ────────────────────────────────────────────────────────────
async function loadRepository() {
  const el = document.getElementById('repository-content');
  try {
    const files = await fetch('/ui/api/repository').then(r => r.json());
    if (!files.length) {
      el.innerHTML = '<p class="empty-state">No agent log files yet.</p>';
      return;
    }
    const groups = {};
    files.forEach(f => {
      if (!groups[f.dir]) groups[f.dir] = [];
      groups[f.dir].push(f);
    });
    let html = '';
    for (const [dir, items] of Object.entries(groups)) {
      html += `<div class="archive-group">
        <div class="archive-group-title">${esc(dir)}</div>`;
      items.forEach(f => {
        const kb = (f.size / 1024).toFixed(1);
        html += `<div class="archive-row">
          <span class="archive-name">${esc(f.name)}</span>
          <span class="archive-meta">${esc(f.mtime)} · ${kb} KB</span>
        </div>`;
      });
      html += '</div>';
    }
    el.innerHTML = html;
  } catch(err) {
    el.innerHTML = `<p class="empty-state">Repository unavailable: ${esc(err.message)}</p>`;
  }
}

// ── Tab loader dispatch ───────────────────────────────────────────────────────
function loadTab(tab) {
  if (tab === 'notes')      loadNotes();
  if (tab === 'todo')       loadTodo();
  if (tab === 'repository') loadRepository();
}

// ── Escape helper ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Initialise on load ───────────────────────────────────────────────────────
activateTab(INITIAL_TAB, false);
if (INITIAL_TAB !== 'discuss') loadTab(INITIAL_TAB);
</script>
</body>
</html>
