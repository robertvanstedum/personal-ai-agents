# Nginx reverse proxy for minimoi — app.minimoi.ai
# Run certbot first: sudo certbot --nginx -d app.minimoi.ai
# Then reload: sudo nginx -s reload

server {
    listen 80;
    server_name app.minimoi.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.minimoi.ai;

    ssl_certificate     /etc/letsencrypt/live/app.minimoi.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.minimoi.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase header and body limits for LLM payloads
    client_max_body_size 10M;
    proxy_read_timeout   120s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # German domain
    location /app/german/ {
        proxy_pass http://127.0.0.1:8767;
    }

    # Curator domain
    location /app/curator/ {
        proxy_pass http://127.0.0.1:8766;
    }

    # Portal (catch-all)
    location / {
        proxy_pass http://127.0.0.1:5001;
    }
}
