# Production docker-compose — EC2 deployment
# Uses ECR images; data files must exist under /opt/minimoi/data/ on the host.
# Run: docker-compose -f docker-compose.prod.yml up -d
# Update images: scripts/deploy.sh

services:
  postgres:
    image: postgres:latest
    container_name: postgres-ai-agents
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - POSTGRES_DB=personal_agents
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"

  curator:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/curator:latest
    container_name: minimoi-curator
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - FLASK_ENV=production
      - PORT=8766
    volumes:
      - /opt/minimoi/data/curator_signals.json:/app/curator_signals.json
      - /opt/minimoi/data/curator_latest.json:/app/curator_latest.json
      - /opt/minimoi/data/curator_radar.json:/app/curator_radar.json
      - /opt/minimoi/data/curator:/app/data/curator
      - /opt/minimoi/data/interests:/app/interests
      - /opt/minimoi/data/research-intelligence:/app/_NewDomains/research-intelligence/data
    ports:
      - "127.0.0.1:8766:8766"
    depends_on:
      - postgres

  german:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/mein-deutsch:latest
    container_name: minimoi-german
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - FLASK_ENV=production
      - PORT=8767
    volumes:
      - /opt/minimoi/data/german:/app/domains/german/data
    ports:
      - "127.0.0.1:8767:8767"

  portuguese:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/portuguese:latest
    container_name: minimoi-portuguese
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - FLASK_ENV=production
      - PORT=8770
    volumes:
      - /opt/minimoi/data/portuguese:/app/domains/portuguese/data
    ports:
      - "127.0.0.1:8770:8770"
    depends_on:
      - postgres

  portal:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/portal:latest
    container_name: minimoi-portal
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - FLASK_ENV=production
      - PORT=5001
    volumes:
      - /opt/minimoi/data/guild/build_queue.json:/app/data/guild/build_queue.json
      - /opt/minimoi/docs/design:/app/docs/design
      - /opt/minimoi/docs/specs:/app/docs/specs
      - /opt/minimoi/auth/users.json:/app/minimoi_portal/auth/users.json
      - /opt/minimoi/auth/guests.json:/app/minimoi_portal/auth/guests.json
      - /opt/minimoi/agent_logs:/app/agent_logs
    ports:
      - "127.0.0.1:5001:5001"
    depends_on:
      - curator
      - german
      - portuguese
      - postgres

  system-bot:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/system-bot:latest
    container_name: minimoi-system-bot
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - MINIMOI_ROLE=production
      - TELEGRAM_CHAT_ID=8379221702
    # Shares the German data volume with the web container so drills, phrasebook,
    # progress and session files are the same store the Gespräche UI reads/writes.
    volumes:
      - /opt/minimoi/data/german:/app/domains/german/data
    depends_on:
      - curator
      - portal
      - german

  cos-bot:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/cos-bot:latest
    container_name: minimoi-cos-bot
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - MINIMOI_ROLE=production
    volumes:
      - /opt/minimoi/cos_memory.md:/app/data/cos_memory.md
      - /opt/minimoi/data/guild/cos_context.json:/app/domains/guild/config/cos_context.json
    depends_on:
      - postgres
      - cos-scheduler

  cos-scheduler:
    image: 332704997792.dkr.ecr.us-east-1.amazonaws.com/minimoi/cos-scheduler:latest
    container_name: minimoi-cos-scheduler
    restart: unless-stopped
    env_file: /opt/minimoi/.env
    environment:
      - MINIMOI_ROLE=production
      - TELEGRAM_CHAT_ID=8379221702
      - PORT=8769
      - DISABLE_TELEGRAM_POLL=1
    volumes:
      - /opt/minimoi/cos_memory.md:/app/data/cos_memory.md
      - /opt/minimoi/data/guild/cos_context.json:/app/domains/guild/config/cos_context.json
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8769:8769"
    depends_on:
      - postgres

volumes:
  postgres-data:
