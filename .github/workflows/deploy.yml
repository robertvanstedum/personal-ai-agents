name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (SHA or latest)'
        default: 'latest'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r requirements.test.txt

      - name: Run regression tests
        run: pytest tests/ -v --junit-xml=data/reports/junit.xml --ignore=tests/smoke

      - name: Check docs/specs naming/duplicates/supersession
        if: always()
        run: python3 scripts/check_spec_format.py

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: data/reports/junit.xml
        if: always()

      - name: File GitHub issues for failures
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          pip install requests -q
          python3 scripts/file_defect.py \
            --junit data/reports/junit.xml \
            --sha $SHA \
            --branch $BRANCH

  build-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push all images
        run: |
          SHA=${{ steps.tag.outputs.sha }}
          REGISTRY=332704997792.dkr.ecr.us-east-1.amazonaws.com
          declare -A IMAGES=(
            ["portal"]="docker/Dockerfile.portal"
            ["curator"]="docker/Dockerfile.curator"
            ["mein-deutsch"]="docker/Dockerfile.german"
            ["portuguese"]="docker/Dockerfile.portuguese"
            ["system-bot"]="docker/Dockerfile.telegram"
            ["cos-bot"]="docker/Dockerfile.cos-bot"
            ["cos-scheduler"]="docker/Dockerfile.cos-scheduler"
          )
          for name in "${!IMAGES[@]}"; do
            dockerfile="${IMAGES[$name]}"
            echo "Building minimoi/$name from $dockerfile"
            docker build \
              -f $dockerfile \
              -t $REGISTRY/minimoi/$name:$SHA \
              -t $REGISTRY/minimoi/$name:latest \
              .
            docker push $REGISTRY/minimoi/$name:$SHA
            docker push $REGISTRY/minimoi/$name:latest
          done

  deploy:
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync docs/specs and design docs to EC2
        run: ./scripts/sync_docs.sh

      - name: Push docker-compose.prod.yml to EC2
        run: |
          COMPOSE=$(base64 -w 0 docker-compose.prod.yml)
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"echo $COMPOSE | base64 -d > /opt/minimoi/docker-compose.prod.yml\"]" \
            --output text
          # Compose push is fast — brief wait is sufficient
          sleep 5

      - name: Deploy on EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 600 \
            --parameters 'commands=[
              "mkdir -p /opt/minimoi/data/portuguese",
              "mkdir -p /opt/minimoi/data/german",
              "mkdir -p /opt/minimoi/data/guild",
              "curl -sf https://raw.githubusercontent.com/robertvanstedum/personal-ai-agents/main/data/guild/build_queue.json -o /opt/minimoi/data/guild/build_queue.json",
              "cd /opt/minimoi",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 332704997792.dkr.ecr.us-east-1.amazonaws.com",
              "docker-compose -f /opt/minimoi/docker-compose.prod.yml pull",
              "docker-compose -f /opt/minimoi/docker-compose.prod.yml up -d --remove-orphans",
              "sleep 15",
              "curl -sf http://localhost:5001/health || exit 1",
              "curl -sf http://localhost:8766/health || exit 1",
              "curl -sf http://localhost:8767/health || exit 1",
              "curl -sf http://localhost:8770/health || exit 1"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "Deploy command ID: $COMMAND_ID"

          # Poll until EC2 confirms completion. Use || echo "Pending" so set -e does not
          # abort on InvocationDoesNotExist (returned when polled too soon after send-command).
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Deploy status: $STATUS"
            if [ "$STATUS" = "Success" ]; then break; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "EC2 deploy FAILED with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
                --query 'StandardErrorContent' --output text 2>/dev/null || true
              exit 1
            fi
            sleep 10
          done

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy timed out after 10 minutes"
            exit 1
          fi

          echo "Deploy confirmed successful on EC2"

  notify:
    needs: [test, build-push, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install requests -q
          python3 scripts/notify_deploy.py \
            --deploy-status "${{ needs.deploy.result }}" \
            --test-status "${{ needs.test.result }}" \
            --sha "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"
