<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --bg-texture: #ede8df;
      --surface: #faf7f2;
      --surface2: #f0ebe0;
      --border: #ddd6c8;
      --border2: #c8bfaf;
      --text: #2a2418;
      --text-muted: #6b5f4e;
      --text-dim: #9e9080;
      --accent: #8b5e2a;
      --accent-dim: rgba(139,94,42,0.08);
      --accent-glow: rgba(139,94,42,0.18);
      --shadow: rgba(42,36,24,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ── Header Nav ── */
    .header-nav { display: flex; gap: 4px; }
    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: var(--accent-dim); border-color: rgba(139,94,42,0.2); }
    .nav-link.nav-focus { letter-spacing: 0; }

    /* ── Domain Rail ── */
    .domain-rail {
      width: 210px;
      min-width: 210px;
      background: #f9f5ed;
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 4px rgba(42,36,24,0.06);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease;
      z-index: 90;
      flex-shrink: 0;
    }
    .domain-rail.collapsed { width: 48px; min-width: 48px; }

    .rail-toggle {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 14px 16px;
      text-align: right;
      transition: color 0.15s;
      align-self: flex-end;
    }
    .rail-toggle:hover { color: var(--accent); }
    .domain-rail.collapsed .rail-toggle { transform: scaleX(-1); }

    .rail-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 12px;
      overflow: hidden;
    }

    .rail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.15s;
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
    }
    .rail-item:hover:not(.rail-coming) { background: var(--surface2); color: var(--text); }
    .rail-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(139,94,42,0.2);
    }
    .rail-item.rail-coming { opacity: 0.4; cursor: default; }

    .rail-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .rail-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .domain-rail.collapsed .rail-label { display: none; }
    .domain-rail.collapsed .rail-item { justify-content: center; }

    .rail-settings {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 16px;
      transition: color 0.15s;
      border-top: 1px solid var(--border);
    }
    .rail-settings:hover { color: var(--accent); }

    .main-content { flex: 1; min-width: 0; overflow-x: hidden; min-height: 100vh; background: var(--bg); }

    /* ── Budget bar ── */
    .budget-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
    }

    .budget-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .budget-label .budget-used {
      font-weight: bold;
      color: var(--text);
    }

    .budget-track {
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .budget-fill {
      height: 100%;
      border-radius: 4px;
      background: #7a9e6e;
      transition: width 0.4s ease;
    }

    .budget-fill.warn { background: #c4933a; }
    .budget-fill.over { background: #b84a3a; }

    /* ── Topic cards ── */
    .topic-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .topic-card.empty {
      opacity: 0.7;
    }

    .topic-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .topic-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .topic-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .topic-stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--text);
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .topic-find {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 0.9rem;
      border-left: 2px solid var(--border);
      padding-left: 0.75rem;
      line-height: 1.4;
    }

    .topic-find.empty-find {
      color: var(--text-dim);
      font-style: normal;
    }

    .topic-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.78rem;
      padding: 0.28rem 0.75rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.12s, color 0.12s;
    }

    .btn:hover { background: var(--surface2); color: var(--text); }

    .btn-run {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn-run:hover { background: var(--accent-glow); }

    /* run command tooltip */
    .run-cmd {
      display: none;
      margin-top: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      background: var(--text);
      color: var(--surface2);
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Status bar ── */
    .status-bar {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: right;
      margin-top: 1.5rem;
    }

    .status-bar .agent-active {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7a9e6e;
      margin-right: 4px;
      vertical-align: middle;
    }

    .status-bar .agent-idle {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      margin-right: 4px;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      .topic-stats { gap: 1rem; }
      .stat-value  { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<aside class="domain-rail">
  <button class="rail-toggle" id="railToggle" title="Toggle rail">‹</button>
  <nav class="rail-nav">
    <a href="/" class="rail-item" data-domain="curator">
      <span class="rail-icon">🗞</span>
      <span class="rail-label">CURATOR</span>
    </a>
    <a href="/research/dashboard" class="rail-item active" data-domain="research">
      <span class="rail-icon">🔬</span>
      <span class="rail-label">RESEARCH</span>
    </a>
    <a href="/language" class="rail-item rail-coming" title="Language Learning — coming soon">
      <span class="rail-icon">💬</span>
      <span class="rail-label">LANGUAGE</span>
    </a>
    <a href="/jobs" class="rail-item rail-coming" title="Jobs &amp; Opportunities — coming soon">
      <span class="rail-icon">💼</span>
      <span class="rail-label">JOBS</span>
    </a>
  </nav>
  <a href="/curator_priorities.html" class="rail-settings" title="Settings">⚙</a>
</aside>
<div class="main-content">
  <header style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;">
    <div style="display: flex; align-items: baseline; gap: 10px;">
      <a href="/" style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.02em;">mini-moi</a>
      <span style="font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase;">Research</span>
    </div>
    <nav class="header-nav" style="display: flex; gap: 4px;">
      <a href="/research/dashboard" class="nav-link active">Dashboard</a>
      <a href="/research/sessions" class="nav-link">Sessions</a>
      <a href="/research/observe" class="nav-link">Observations</a>
      <a href="/research/candidates" class="nav-link">Queries</a>
      <a href="/research/save" class="nav-link">Save</a>
      <a href="/curator_priorities.html" class="nav-link nav-focus">🎯</a>
    </nav>
  </header>
  <div class="container">

  <h1>Research Intelligence</h1>
  <p class="subtitle" id="subtitle">Loading…</p>

  <div class="budget-row" id="budget-row" style="display:none">
    <div class="budget-label">
      <span>Pilot budget</span>
      <span><span class="budget-used" id="budget-used">—</span> of <span id="budget-total">—</span> used · <span id="budget-pct">—</span>%</span>
    </div>
    <div class="budget-track">
      <div class="budget-fill" id="budget-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="topic-cards"></div>

  <div class="status-bar" id="status-bar"></div>

</div>

<script>
  const REFRESH_MS = 60000;
  let refreshTimer = null;

  async function load() {
    try {
      const res  = await fetch('/api/research/dashboard');
      const data = await res.json();
      if (!data.ok) { showError(data.error || 'API error'); return; }
      render(data);
      scheduleRefresh(data.agent_active);
    } catch (e) {
      showError(e.message);
    }
  }

  function render(data) {
    const now = new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'});
    document.getElementById('subtitle').textContent =
      `Overview of all active research topics · refreshed ${now}`;

    // Budget bar
    const b = data.budget;
    document.getElementById('budget-row').style.display = '';
    document.getElementById('budget-used').textContent  = '$' + b.used.toFixed(2);
    document.getElementById('budget-total').textContent = '$' + b.total.toFixed(2);
    document.getElementById('budget-pct').textContent   = b.pct.toFixed(1);

    const fill = document.getElementById('budget-fill');
    fill.style.width = Math.min(b.pct, 100) + '%';
    fill.className   = 'budget-fill' +
      (b.used >= b.warn  ? ' over' :
       b.used >= b.warn * 0.85 ? ' warn' : '');

    // Topic cards
    const container = document.getElementById('topic-cards');
    container.innerHTML = '';
    for (const t of data.topics) {
      container.appendChild(buildCard(t));
    }

    // Status bar
    const bar = document.getElementById('status-bar');
    if (data.agent_active) {
      bar.innerHTML = '<span class="agent-active"></span> Agent running · auto-refresh on';
    } else {
      bar.innerHTML = '<span class="agent-idle"></span> Agent idle · last refreshed ' + now;
    }
  }

  function buildCard(t) {
    const isEmpty   = t.session_count === 0;
    const lastRun   = t.last_run
      ? new Date(t.last_run).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})
      : 'never';
    const topFind   = t.top_find || null;
    const runCmd    = `python agent/research.py --topic ${t.topic} --session-name ${t.topic}-001`;

    const card = document.createElement('div');
    card.className = 'topic-card' + (isEmpty ? ' empty' : '');

    card.innerHTML = `
      <div class="topic-header">
        <span class="topic-name">${t.topic}</span>
        <span class="topic-meta">Last run: ${lastRun}</span>
      </div>
      <div class="topic-stats">
        <div class="stat">
          <span class="stat-value">${t.session_count}</span>
          <span class="stat-label">Sessions</span>
        </div>
        <div class="stat">
          <span class="stat-value">${t.saved_count}</span>
          <span class="stat-label">Saved</span>
        </div>
        <div class="stat">
          <span class="stat-value">${t.candidate_count}</span>
          <span class="stat-label">Candidates</span>
        </div>
      </div>
      ${topFind
        ? `<div class="topic-find">⭐ ${topFind}</div>`
        : `<div class="topic-find empty-find">No sessions run yet</div>`
      }
      <div class="topic-actions">
        <button class="btn btn-run" onclick="toggleCmd(this, '${runCmd}')">Run Session ▾</button>
        <a class="btn" href="/research/observe?topic=${t.topic}">Observe</a>
        <a class="btn" href="/research/candidates?topic=${t.topic}">Candidates</a>
      </div>
      <div class="run-cmd"></div>
    `;

    return card;
  }

  function toggleCmd(btn, cmd) {
    const cmdEl = btn.closest('.topic-card').querySelector('.run-cmd');
    if (cmdEl.style.display === 'block') {
      cmdEl.style.display = 'none';
      btn.textContent = 'Run Session ▾';
    } else {
      cmdEl.textContent = cmd;
      cmdEl.style.display = 'block';
      btn.textContent = 'Run Session ▴';
    }
  }

  function scheduleRefresh(agentActive) {
    clearTimeout(refreshTimer);
    if (agentActive) {
      refreshTimer = setTimeout(load, REFRESH_MS);
    }
  }

  function showError(msg) {
    document.getElementById('subtitle').textContent = '⚠ ' + msg;
  }

  load();
</script>
</div>
</div>
<script>
(function() {
  var toggle = document.getElementById('railToggle');
  if (toggle) toggle.addEventListener('click', function() {
    document.querySelector('.domain-rail').classList.toggle('collapsed');
  });
})();
</script>
</body>
</html>
