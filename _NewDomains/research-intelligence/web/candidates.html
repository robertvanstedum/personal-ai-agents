<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Candidates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --bg-texture: #ede8df;
      --surface: #faf7f2;
      --surface2: #f0ebe0;
      --border: #ddd6c8;
      --border2: #c8bfaf;
      --text: #2a2418;
      --text-muted: #6b5f4e;
      --text-dim: #9e9080;
      --accent: #8b5e2a;
      --accent-dim: rgba(139,94,42,0.08);
      --accent-glow: rgba(139,94,42,0.18);
      --shadow: rgba(42,36,24,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
    }

    .container { max-width: 860px; margin: 0 auto; padding: 2rem 1rem; }

    /* ── Header Nav ── */
    .header-nav { display: flex; gap: 4px; }
    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: var(--accent-dim); border-color: rgba(139,94,42,0.2); }
    .nav-link.nav-focus { letter-spacing: 0; }

    /* ── Domain Rail ── */
    .domain-rail {
      width: 210px;
      min-width: 210px;
      background: #f9f5ed;
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 4px rgba(42,36,24,0.06);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease;
      z-index: 90;
      flex-shrink: 0;
    }
    .domain-rail.collapsed { width: 48px; min-width: 48px; }

    .rail-toggle {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 14px 16px;
      text-align: right;
      transition: color 0.15s;
      align-self: flex-end;
    }
    .rail-toggle:hover { color: var(--accent); }
    .domain-rail.collapsed .rail-toggle { transform: scaleX(-1); }

    .rail-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 12px;
      overflow: hidden;
    }

    .rail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.15s;
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
    }
    .rail-item:hover:not(.rail-coming) { background: var(--surface2); color: var(--text); }
    .rail-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(139,94,42,0.2);
    }
    .rail-item.rail-coming { opacity: 0.4; cursor: default; }

    .rail-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .rail-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .domain-rail.collapsed .rail-label { display: none; }
    .domain-rail.collapsed .rail-item { justify-content: center; }

    .rail-settings {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 16px;
      transition: color 0.15s;
      border-top: 1px solid var(--border);
    }
    .rail-settings:hover { color: var(--accent); }

    .main-content { flex: 1; min-width: 0; overflow-x: hidden; }

    /* ── Header ── */
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.75rem;
    }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .field label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input, .field select {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.92rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.45rem 0.7rem;
      color: var(--text);
      outline: none;
    }

    .field input { min-width: 200px; }
    .field select { min-width: 150px; }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    button.filter-btn {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.92rem;
      background: var(--accent);
      color: var(--surface);
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.filter-btn:hover  { background: var(--text); }
    button.filter-btn:active { background: var(--text); }

    /* ── Row count ── */
    .row-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
      min-height: 1.1rem;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: var(--surface2);
      color: var(--text);
      font-weight: normal;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0.6rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 0.65rem 1rem;
      vertical-align: middle;
      color: var(--text);
    }

    td.id-col   { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; font-family: 'DM Mono', monospace; }
    td.topic-col { font-size: 0.82rem; color: var(--text-muted); white-space: nowrap; }
    td.query-col { line-height: 1.45; }
    td.action-col { white-space: nowrap; }

    /* ── Action buttons ── */
    .btn-promote, .btn-retire {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.82rem;
      border-radius: 3px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      border: 1px solid;
      transition: background 0.12s, color 0.12s;
      margin-right: 0.3rem;
    }

    .btn-promote {
      background: var(--surface);
      color: #4a8c28;
      border-color: #9abf80;
    }

    .btn-promote:hover  { background: #4a8c28; color: #fff; border-color: #4a8c28; }
    .btn-promote:active { background: #2c6010; color: #fff; }

    .btn-retire {
      background: var(--surface);
      color: #8b2020;
      border-color: #c89898;
    }

    .btn-retire:hover  { background: #8b2020; color: #fff; border-color: #8b2020; }
    .btn-retire:active { background: #5a1010; color: #fff; }

    .btn-promote:disabled, .btn-retire:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Empty state ── */
    .empty-state {
      padding: 2.5rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Status bar ── */
    #status {
      margin-top: 0.9rem;
      font-size: 0.84rem;
      color: var(--text-muted);
      min-height: 1.2rem;
    }

    #status.error { color: #8b2020; }
    #status.ok    { color: #4a8c28; }

    @media (max-width: 600px) {
      .filter-bar { flex-direction: column; }
      .field input, .field select { min-width: 0; width: 100%; }
      td.id-col, td.topic-col { display: none; }
    }
  </style>
</head>
<body>
<aside class="domain-rail">
  <button class="rail-toggle" id="railToggle" title="Toggle rail">‹</button>
  <nav class="rail-nav">
    <a href="/" class="rail-item" data-domain="curator">
      <span class="rail-icon">🗞</span>
      <span class="rail-label">CURATOR</span>
    </a>
    <a href="/research/dashboard" class="rail-item active" data-domain="research">
      <span class="rail-icon">🔬</span>
      <span class="rail-label">RESEARCH</span>
    </a>
    <span class="rail-item rail-coming" title="Language Learning — coming soon">
      <span class="rail-icon">💬</span>
      <span class="rail-label">LANGUAGE</span>
    </span>
    <span class="rail-item rail-coming" title="Jobs &amp; Opportunities — coming soon">
      <span class="rail-icon">💼</span>
      <span class="rail-label">JOBS</span>
    </span>
  </nav>
  <a href="/curator_priorities.html" class="rail-settings" title="Settings">⚙</a>
</aside>
<div class="main-content">
  <header style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;">
    <div style="display: flex; align-items: baseline; gap: 10px;">
      <a href="/" style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.02em;">mini-moi</a>
      <span style="font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase;">Research</span>
    </div>
    <nav class="header-nav" style="display: flex; gap: 4px;">
      <a href="/research/dashboard" class="nav-link">Dashboard</a>
      <a href="/research/candidates" class="nav-link active">Queries</a>
      <a href="/research/observe" class="nav-link">Observations</a>
      <a href="/research/save" class="nav-link">Save</a>
      <a href="/curator_priorities.html" class="nav-link nav-focus">🎯</a>
    </nav>
  </header>
  <div class="container">

  <h1>Research Candidates</h1>
  <p class="subtitle">Query candidates extracted by the observer · promote to feed next session, retire to remove</p>

  <div class="filter-bar">
    <div class="field">
      <label>Topic</label>
      <input type="text" id="f-topic" placeholder="e.g. empire-landpower" oninput="applyFilters()">
    </div>
    <div class="field">
      <label>Status</label>
      <select id="f-status" onchange="loadCandidates()">
        <option value="candidate">Candidate</option>
        <option value="promoted">Promoted</option>
        <option value="retired">Retired</option>
      </select>
    </div>
    <button class="filter-btn" onclick="loadCandidates()">Refresh</button>
  </div>

  <div class="row-count" id="row-count"></div>

  <div class="table-wrap">
    <table id="candidates-table">
      <thead>
        <tr>
          <th class="id-col">ID</th>
          <th class="topic-col">Topic</th>
          <th>Query</th>
          <th class="action-col">Actions</th>
        </tr>
      </thead>
      <tbody id="candidates-body">
        <tr><td colspan="4" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div id="status"></div>

</div>

<script>
  let allRows = [];

  async function loadCandidates() {
    const status = document.getElementById('f-status').value;
    setStatus('Loading…');
    try {
      const res  = await fetch(`/api/research/candidates?status=${encodeURIComponent(status)}`);
      const data = await res.json();
      if (!data.ok) { setStatus(`Error: ${data.error}`, 'error'); return; }
      allRows = data.candidates;
      applyFilters();
      setStatus('');
    } catch (err) {
      setStatus(`Network error: ${err.message}`, 'error');
    }
  }

  function applyFilters() {
    const topicFilter = document.getElementById('f-topic').value.trim().toLowerCase();
    const status      = document.getElementById('f-status').value;
    const filtered    = topicFilter
      ? allRows.filter(r => (r.topic || '').toLowerCase().includes(topicFilter))
      : allRows;
    renderRows(filtered, status);
  }

  function renderRows(rows, status) {
    const tbody = document.getElementById('candidates-body');
    const count = document.getElementById('row-count');

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty-state">No ${status} candidates found.</td></tr>`;
      count.textContent = '';
      return;
    }

    count.textContent = `${rows.length} record${rows.length !== 1 ? 's' : ''}`;

    tbody.innerHTML = rows.map(r => {
      const actionBtns = status === 'candidate'
        ? `<button class="btn-promote" onclick="promote('${r.id}', this)">↑ Promote</button>
           <button class="btn-retire"  onclick="retire('${r.id}', this)">× Retire</button>`
        : `<span style="font-size:0.78rem;color:#8a7055">${status}</span>`;
      return `
        <tr id="row-${r.id}">
          <td class="id-col">${escHtml(r.id)}</td>
          <td class="topic-col">${escHtml(r.topic || '—')}</td>
          <td class="query-col">${escHtml(r.query || '—')}</td>
          <td class="action-col">${actionBtns}</td>
        </tr>`;
    }).join('');
  }

  async function promote(id, btn) {
    await doAction('/api/research/candidates/promote', id, btn, `Promoted`);
  }

  async function retire(id, btn) {
    await doAction('/api/research/candidates/retire', id, btn, `Retired`);
  }

  async function doAction(endpoint, id, triggerBtn, verb) {
    // Disable both buttons in the row while in-flight
    const row  = document.getElementById(`row-${id}`);
    const btns = row ? row.querySelectorAll('button') : [];
    btns.forEach(b => b.disabled = true);

    try {
      const res  = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id}),
      });
      const data = await res.json();

      if (data.ok) {
        setStatus(`${verb}: "${truncate(data.query, 60)}"`, 'ok');
        // Remove row from DOM — no hide, no stale counts
        if (row) row.remove();
        updateCount();
      } else {
        setStatus(`Error: ${data.error}`, 'error');
        btns.forEach(b => b.disabled = false);
      }
    } catch (err) {
      setStatus(`Network error: ${err.message}`, 'error');
      btns.forEach(b => b.disabled = false);
    }
  }

  function updateCount() {
    const tbody = document.getElementById('candidates-body');
    const rows  = tbody.querySelectorAll('tr[id^="row-"]');
    const count = document.getElementById('row-count');
    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="empty-state">All done — no more candidates in this view.</td></tr>`;
      count.textContent = '';
    } else {
      count.textContent = `${rows.length} record${rows.length !== 1 ? 's' : ''}`;
    }
  }

  function setStatus(msg, cls = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = cls;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function truncate(str, n) {
    return str && str.length > n ? str.slice(0, n) + '…' : str;
  }

  // Load on page open
  loadCandidates();
</script>
</div>
</div>
<script>
(function() {
  var toggle = document.getElementById('railToggle');
  if (toggle) toggle.addEventListener('click', function() {
    document.querySelector('.domain-rail').classList.toggle('collapsed');
  });
})();
</script>
</body>
</html>
