<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save Article</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0e8;
      color: #2c1f0e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 620px; margin: 0 auto; }

    /* ── Nav ── */
    .research-nav {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .research-nav a {
      font-family: Georgia, serif;
      font-size: 0.82rem;
      color: #6b5540;
      text-decoration: none;
      padding: 0.3rem 0.8rem;
      border: 1px solid #c8b898;
      border-radius: 3px;
      background: #fdf8f0;
      transition: background 0.12s, color 0.12s;
    }

    .research-nav a:hover  { background: #eee4d0; color: #4a3520; }
    .research-nav a.active {
      background: #6b4c28;
      color: #fdf8f0;
      border-color: #6b4c28;
    }

    /* ── Header ── */
    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #4a3520;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #8a7055;
      margin-bottom: 1.75rem;
    }

    /* ── Form card ── */
    .form-card {
      background: #fdf8f0;
      border: 1px solid #d4c5a9;
      border-radius: 6px;
      padding: 1.5rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.1rem;
    }

    .field:last-of-type { margin-bottom: 0; }

    .field label {
      font-size: 0.75rem;
      color: #6b5540;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field label .req { color: #8b3a3a; margin-left: 0.15rem; }

    .field input, .field textarea {
      font-family: Georgia, serif;
      font-size: 0.95rem;
      background: #fff8ee;
      border: 1px solid #c8b898;
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      color: #2c1f0e;
      outline: none;
      width: 100%;
    }

    .field input:focus, .field textarea:focus {
      border-color: #8a6a40;
      background: #fffdf5;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
      line-height: 1.5;
    }

    .field .hint {
      font-size: 0.76rem;
      color: #9a8060;
    }

    /* ── Submit ── */
    .submit-row {
      margin-top: 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    button[type="submit"] {
      font-family: Georgia, serif;
      font-size: 0.95rem;
      background: #6b4c28;
      color: #fdf8f0;
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1.6rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button[type="submit"]:hover   { background: #4a3520; }
    button[type="submit"]:active  { background: #2c1f0e; }
    button[type="submit"]:disabled { background: #b0a090; cursor: not-allowed; }

    /* ── Inline status ── */
    #status {
      font-size: 0.87rem;
      min-height: 1.2rem;
    }

    #status.ok        { color: #4a8c28; }
    #status.duplicate { color: #8a6010; }
    #status.error     { color: #8b2020; }
  </style>
</head>
<body>
<div class="container">

  <nav class="research-nav">
    <a href="/research/dashboard">Dashboard</a>
    <a href="/research/observe">Observe</a>
    <a href="/research/candidates">Candidates</a>
    <a href="/research/save" class="active">Save</a>
    <a href="/curator_intelligence.html">Library</a>
  </nav>

  <h1>Save Article</h1>
  <p class="subtitle">Record a high-value source with a note · note field feeds Sonnet synthesis</p>

  <div class="form-card">
    <form id="save-form" onsubmit="submitSave(event)">

      <div class="field">
        <label>URL <span class="req">*</span></label>
        <input type="url" id="f-url" placeholder="https://…" required autocomplete="off">
      </div>

      <div class="field">
        <label>Title</label>
        <input type="text" id="f-title" placeholder="Article or paper title" autocomplete="off">
      </div>

      <div class="field">
        <label>Session ID <span class="req">*</span></label>
        <input type="text" id="f-session" placeholder="e.g. kotkin-008" required autocomplete="off">
        <span class="hint">The research session you found this in. Check session-log.md for the name.</span>
      </div>

      <div class="field">
        <label>Note</label>
        <textarea id="f-note" placeholder="What caught your attention? Why does it matter to the thread?"></textarea>
        <span class="hint">This goes directly into Sonnet synthesis — the more specific, the better.</span>
      </div>

      <div class="submit-row">
        <button type="submit" id="submit-btn">Save Article</button>
        <div id="status"></div>
      </div>

    </form>
  </div>

</div>

<script>
  async function submitSave(e) {
    e.preventDefault();

    const url        = document.getElementById('f-url').value.trim();
    const title      = document.getElementById('f-title').value.trim();
    const session_id = document.getElementById('f-session').value.trim();
    const note       = document.getElementById('f-note').value.trim() || null;
    const btn        = document.getElementById('submit-btn');

    if (!url)        { setStatus('URL is required.', 'error'); return; }
    if (!session_id) { setStatus('Session ID is required.', 'error'); return; }

    btn.disabled    = true;
    btn.textContent = 'Saving…';
    setStatus('');

    try {
      const res  = await fetch('/api/research/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url, title, session_id, note}),
      });
      const data = await res.json();

      if (data.ok) {
        setStatus('✓ Saved', 'ok');
        // Clear form for next entry, keep session_id
        document.getElementById('f-url').value   = '';
        document.getElementById('f-title').value = '';
        document.getElementById('f-note').value  = '';
      } else if (data.duplicate) {
        setStatus('⚠ Already saved — duplicate URL skipped', 'duplicate');
      } else {
        setStatus(`✗ Error: ${data.error}`, 'error');
      }
    } catch (err) {
      setStatus(`✗ Network error: ${err.message}`, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Save Article';
    }
  }

  function setStatus(msg, cls = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className   = cls;
  }
</script>
</body>
</html>
