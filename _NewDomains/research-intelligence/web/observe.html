<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Observer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --bg-texture: #ede8df;
      --surface: #faf7f2;
      --surface2: #f0ebe0;
      --border: #ddd6c8;
      --border2: #c8bfaf;
      --text: #2a2418;
      --text-muted: #6b5f4e;
      --text-dim: #9e9080;
      --accent: #8b5e2a;
      --accent-dim: rgba(139,94,42,0.08);
      --accent-glow: rgba(139,94,42,0.18);
      --shadow: rgba(42,36,24,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ── Header Nav ── */
    .header-nav { display: flex; gap: 4px; }
    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); background: var(--accent-dim); border-color: rgba(139,94,42,0.2); }
    .nav-link.nav-focus { letter-spacing: 0; }

    /* ── Domain Rail ── */
    .domain-rail {
      width: 210px;
      min-width: 210px;
      background: #f9f5ed;
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 4px rgba(42,36,24,0.06);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease;
      z-index: 90;
      flex-shrink: 0;
    }
    .domain-rail.collapsed { width: 48px; min-width: 48px; }

    .rail-toggle {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 14px 16px;
      text-align: right;
      transition: color 0.15s;
      align-self: flex-end;
    }
    .rail-toggle:hover { color: var(--accent); }
    .domain-rail.collapsed .rail-toggle { transform: scaleX(-1); }

    .rail-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 12px;
      overflow: hidden;
    }

    .rail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-muted);
      transition: all 0.15s;
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
    }
    .rail-item:hover:not(.rail-coming) { background: var(--surface2); color: var(--text); }
    .rail-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(139,94,42,0.2);
    }
    .rail-item.rail-coming { opacity: 0.4; cursor: default; }

    .rail-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
    .rail-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .domain-rail.collapsed .rail-label { display: none; }
    .domain-rail.collapsed .rail-item { justify-content: center; }

    .rail-settings {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 16px;
      transition: color 0.15s;
      border-top: 1px solid var(--border);
    }
    .rail-settings:hover { color: var(--accent); }

    .main-content { flex: 1; min-width: 0; overflow-x: hidden; min-height: 100vh; background: var(--bg); }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input, .field select {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      color: var(--text);
      outline: none;
    }

    .field input { min-width: 260px; }
    .field select { min-width: 140px; }

    .field input:focus, .field select:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    button {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      background: var(--accent);
      color: var(--surface);
      border: none;
      border-radius: 4px;
      padding: 0.55rem 1.4rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover  { background: var(--text); }
    button:active { background: var(--text); }
    button:disabled { background: var(--text-dim); cursor: not-allowed; }

    /* Result area */
    #result {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    #cost-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    #cost-bar span { white-space: nowrap; }
    #cost-bar .cost-highlight { color: var(--text); font-weight: bold; }

    #observation-text {
      padding: 1.5rem;
      font-size: 0.95rem;
      line-height: 1.75;
      white-space: pre-wrap;
      color: var(--text);
    }

    #observation-text h1, #observation-text h2, #observation-text h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: bold;
      margin: 1rem 0 0.4rem;
      color: var(--text);
    }

    #observation-text strong { color: var(--text); }

    #file-link {
      padding: 0.5rem 1rem;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* Status/error */
    #status {
      font-size: 0.85rem;
      color: var(--text-muted);
      min-height: 1.2rem;
      margin-top: 0.75rem;
    }

    #status.error { color: #8b2020; }

    /* History */
    #history-section { margin-top: 2rem; }
    #history-section h2 {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      color: var(--text);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    .history-item .meta { color: var(--text-muted); font-size: 0.78rem; white-space: nowrap; }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .field input { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>
<aside class="domain-rail">
  <button class="rail-toggle" id="railToggle" title="Toggle rail">‹</button>
  <nav class="rail-nav">
    <a href="/" class="rail-item" data-domain="curator">
      <span class="rail-icon">🗞</span>
      <span class="rail-label">CURATOR</span>
    </a>
    <a href="/research/dashboard" class="rail-item active" data-domain="research">
      <span class="rail-icon">🔬</span>
      <span class="rail-label">RESEARCH</span>
    </a>
    <a href="/language" class="rail-item rail-coming" title="Language Learning — coming soon">
      <span class="rail-icon">💬</span>
      <span class="rail-label">LANGUAGE</span>
    </a>
    <a href="/jobs" class="rail-item rail-coming" title="Jobs &amp; Opportunities — coming soon">
      <span class="rail-icon">💼</span>
      <span class="rail-label">JOBS</span>
    </a>
  </nav>
  <a href="/curator_priorities.html" class="rail-settings" title="Settings">⚙</a>
</aside>
<div class="main-content">
  <header style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;">
    <div style="display: flex; align-items: baseline; gap: 10px;">
      <a href="/" style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.02em;">mini-moi</a>
      <span style="font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase;">Research</span>
    </div>
    <nav class="header-nav" style="display: flex; gap: 4px;">
      <a href="/research/dashboard" class="nav-link">Dashboard</a>
      <a href="/research/candidates" class="nav-link">Queries</a>
      <a href="/research/observe" class="nav-link active">Observations</a>
      <a href="/research/save" class="nav-link">Save</a>
      <a href="/curator_priorities.html" class="nav-link nav-focus">🎯</a>
    </nav>
  </header>
  <div class="container">

  <h1>Research Observer</h1>
  <p class="subtitle">Synthesise saved research signals with Sonnet · Option A: saved articles only</p>

  <div class="form-card">
    <div class="form-row">
      <div class="field">
        <label>Topic</label>
        <input type="text" id="topic" value="empire-landpower" placeholder="e.g. empire-landpower">
      </div>
      <div class="field">
        <label>Command</label>
        <select id="command">
          <option value="observe">observe</option>
          <option value="status">status</option>
        </select>
      </div>
      <button id="run-btn" onclick="runObserve()">Run</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="result">
    <div id="cost-bar"></div>
    <div id="observation-text"></div>
    <div id="file-link"></div>
  </div>

  <div id="history-section" style="display:none">
    <h2>This session</h2>
    <div id="history-list"></div>
  </div>

</div>

<script>
  const history = [];

  async function runObserve() {
    const topic   = document.getElementById('topic').value.trim();
    const command = document.getElementById('command').value;
    const btn     = document.getElementById('run-btn');
    const status  = document.getElementById('status');

    if (!topic) { setStatus('Topic is required.', true); return; }

    btn.disabled = true;
    btn.textContent = 'Running…';
    setStatus(`Calling Sonnet via observe.py — ${command} on "${topic}"…`);
    document.getElementById('result').style.display = 'none';

    try {
      const res = await fetch('/api/research/observe', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({topic, command}),
      });

      const data = await res.json();

      if (!data.ok) {
        setStatus(`Error: ${data.error}`, true);
        return;
      }

      renderResult(data, topic, command);
      addToHistory(data, topic, command);
      setStatus('');

    } catch (err) {
      setStatus(`Network error: ${err.message}`, true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Run';
    }
  }

  function renderResult(data, topic, command) {
    // Cost bar
    const tokensIn   = (data.tokens_in  || 0).toLocaleString();
    const tokensOut  = (data.tokens_out || 0).toLocaleString();
    const cost       = (data.cost_usd   || 0).toFixed(4);
    const articles   = data.saved_articles_used ?? '—';
    const totalCost  = (data.total_cost_usd || data.cost_usd || 0).toFixed(4);
    const candidates = data.query_candidates_added ?? 0;

    let haikusPart = '';
    if (data.haiku_tokens_in) {
      const hIn  = (data.haiku_tokens_in  || 0).toLocaleString();
      const hOut = (data.haiku_tokens_out || 0).toLocaleString();
      const hCost = (data.haiku_cost_usd  || 0).toFixed(4);
      haikusPart = `<span>Haiku · ${hIn} in / ${hOut} out · $${hCost}</span>`;
    }

    document.getElementById('cost-bar').innerHTML =
      `<span>Sonnet · ${tokensIn} in / ${tokensOut} out · $${cost}</span>` +
      haikusPart +
      `<span class="cost-highlight">Total $${totalCost}</span>` +
      `<span>${articles} article${articles !== 1 ? 's' : ''} · ${candidates} quer${candidates !== 1 ? 'ies' : 'y'} extracted</span>` +
      `<span>${topic} · ${command}</span>`;

    // Observation text — basic markdown rendering
    document.getElementById('observation-text').innerHTML =
      renderMarkdown(data.text || '(no output)');

    // File link
    document.getElementById('file-link').textContent =
      `Saved to: ${data.output_file || '—'}`;

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({behavior: 'smooth', block: 'start'});
  }

  function addToHistory(data, topic, command) {
    history.unshift({data, topic, command, ts: new Date().toLocaleTimeString()});
    const section = document.getElementById('history-section');
    const list    = document.getElementById('history-list');
    section.style.display = 'block';
    list.innerHTML = history.slice(0, 5).map(h =>
      `<div class="history-item">
        <span>${h.topic} · ${h.command}</span>
        <span class="meta">$${(h.data.cost_usd||0).toFixed(4)} · ${h.ts}</span>
      </div>`
    ).join('');
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  // Minimal markdown → HTML (headers, bold, paragraphs)
  function renderMarkdown(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
      .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,    '<em>$1</em>')
      .replace(/\n{2,}/g, '\n\n')
      .split('\n\n').map(p => p.startsWith('<h') ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`)
      .join('\n');
  }
</script>
</div>
</div>
<script>
(function() {
  var toggle = document.getElementById('railToggle');
  if (toggle) toggle.addEventListener('click', function() {
    document.querySelector('.domain-rail').classList.toggle('collapsed');
  });
})();
</script>
</body>
</html>
