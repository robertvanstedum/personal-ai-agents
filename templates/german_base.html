<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}German{% endblock %} — Sprache</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/german.css">
  {% block head %}{% endblock %}
</head>
<body>

<nav class="tab-rail">
  <a href="/lesen"      class="tab {% if active=='lesen' %}active{% endif %}">Lesen</a>
  <a href="/schreiben"  class="tab {% if active=='schreiben' %}active{% endif %}">Schreiben</a>
  <a href="/ueben"      class="tab {% if active=='ueben' %}active{% endif %}">Üben</a>
  <a href="/bibliothek" class="tab {% if active=='bibliothek' %}active{% endif %}">Bibliothek</a>
  <a href="/admin"      class="tab {% if active=='admin' %}active{% endif %}">Admin</a>
  <a href="/archiv"     class="tab disabled {% if active=='archiv' %}active{% endif %}">Archiv</a>
</nav>

<main class="page">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
