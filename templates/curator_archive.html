<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Curator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #F5F0E8;
      --surface:    #faf7f2;
      --surface2:   #f0ebe0;
      --text:       #2A1F14;
      --text-muted: #6b5f4e;
      --text-dim:   #9e9080;
      --accent:     #8b5e2a;
      --accent-dim: rgba(139,94,42,0.08);
      --border:     #ddd6c8;
      --border2:    #C4B49A;
      --rule:       #C4B49A;
      --shadow:     rgba(42,31,20,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Subnav (standardized Phase 2) ── */
    nav.curator-subnav {
      position: sticky; top: 0; z-index: 100;
      height: 44px;
      background: rgba(245,240,232,0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 1.5rem;
    }
    .subnav-tab {
      font-family: 'DM Mono', monospace; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); text-decoration: none;
      padding: 0 14px; height: 44px;
      display: flex; align-items: center;
      border-bottom: 2px solid transparent; transition: color 0.15s;
    }
    .subnav-tab:hover { color: var(--text); }
    .subnav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .subnav-focus { margin-left: auto; }
    .nav-tip { position: relative; background: none; border: none; padding: 4px 0 4px 1rem; cursor: default; font-size: 14px; opacity: 0.55; transition: opacity 0.15s; flex-shrink: 0; }
    .nav-tip:hover, .nav-tip.tip-open { opacity: 1; }
    .nav-tip-popover { display: none; position: absolute; top: calc(100% + 10px); right: 0; width: 280px; padding: 10px 14px; background: rgba(42,31,20,0.97); color: #f0ebe0; border-radius: 6px; font-size: 12px; line-height: 1.5; z-index: 200; }
    .nav-tip:hover .nav-tip-popover, .nav-tip.tip-open .nav-tip-popover { display: block; }
    @media (max-width: 768px) { .nav-tip-popover { position: fixed; bottom: 60px; right: 8px; width: calc(100vw - 16px); max-width: 340px; } }

    /* ── Main layout ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 32px 80px;
    }

    /* ── Page header ── */
    .page-header { margin-bottom: 24px; }
    .page-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.7rem; font-weight: 400; margin-bottom: 4px;
    }
    .page-sub { font-size: 0.85rem; color: var(--text-muted); }

    /* ── Search bar ── */
    .search-wrap { margin-bottom: 2rem; }
    .search-input {
      width: 100%; padding: 10px 14px;
      font-family: 'Source Sans 3', sans-serif; font-size: 14px;
      color: var(--text); background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* ── Section ── */
    .archive-section { margin-bottom: 2.5rem; }
    .section-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 0;
    }
    .section-kicker {
      font-family: 'DM Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim);
    }
    .section-count {
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: var(--text-dim); opacity: 0.6; margin-left: 8px;
    }
    .show-all-link {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--accent); text-decoration: none; cursor: pointer;
    }
    .show-all-link:hover { text-decoration: underline; }

    /* ── Rows ── */
    .archive-rows { margin-top: 6px; }
    .archive-row {
      display: flex; align-items: baseline; gap: 12px;
      padding: 9px 0;
      border-bottom: 0.5px solid var(--rule);
      font-size: 13px;
    }
    .archive-row:last-child { border-bottom: none; }
    .row-date {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--text-muted); white-space: nowrap; min-width: 100px;
      flex-shrink: 0;
    }
    .row-title { font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row-title.muted { font-weight: 400; color: var(--text-muted); }
    .row-source { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .row-action { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); text-decoration: none; white-space: nowrap; flex-shrink: 0; }
    .row-action:hover { text-decoration: underline; }
    .row-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .dive-badge {
      font-family: 'DM Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); border: 1px solid var(--border2);
      border-radius: 3px; padding: 1px 5px; white-space: nowrap; flex-shrink: 0;
    }

    /* ── Show more / collapse rows ── */
    .show-more-row {
      padding: 8px 0; font-size: 12px; color: var(--text-muted);
      cursor: pointer; border-bottom: none;
    }
    .show-more-row:hover { color: var(--accent); }
    /* Bottom collapse anchor — shown at foot of expanded section */
    .bottom-collapse {
      text-align: right;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--accent); cursor: pointer;
    }
    .bottom-collapse:hover { text-decoration: underline; }
    /* Daily editions: rows hidden beyond initial batch */
    .daily-hidden { display: none; }

    /* ── Empty state ── */
    .archive-empty {
      font-size: 0.85rem; color: var(--text-dim); font-style: italic;
      padding: 10px 0;
    }

    /* ── Search results ── */
    .search-results { display: none; }
    .search-results-header {
      font-size: 12px; color: var(--text-muted); margin-bottom: 1rem;
    }
    .result-type-badge {
      font-family: 'DM Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim); border: 1px solid var(--border2);
      border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
    }
  </style>
</head>
<body>

<nav class="curator-subnav">
  <a href="/briefing" class="subnav-tab">Daily</a>
  <a href="/curator_library.html" class="subnav-tab">Reading Room</a>
  <a href="/scans-dives" class="subnav-tab">Scans &amp; Dives</a>
  <a href="/research/leanings" class="subnav-tab">Leanings</a>
  <a href="/archive" class="subnav-tab active">Archive</a>
  <a href="/research/dashboard" class="subnav-tab subnav-focus">Desk</a>
  {% if tip %}<button class="nav-tip" id="navTip" aria-label="Tip" type="button">💡<span class="nav-tip-popover">{{ tip }}</span></button>{% endif %}
</nav>

<main>
  <div class="page-header">
    <h1 class="page-title">Archive</h1>
    <p class="page-sub">Everything kept, and searchable over time.</p>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text"
      placeholder="Search across all archives…" autocomplete="off">
  </div>

  <!-- Search results (shown when query active) -->
  <div class="search-results" id="searchResults">
    <div class="search-results-header" id="searchHeader"></div>
    <div class="archive-rows" id="searchRows"></div>
  </div>

  <!-- Five sections (hidden when search active) -->
  <div id="allSections">

    <!-- Daily editions -->
    <div class="archive-section">
      <div class="section-head">
        <span>
          <span class="section-kicker">Daily editions</span>
          <span class="section-count" id="cnt-daily"></span>
        </span>
      </div>
      <div class="archive-rows" id="rows-daily"></div>
    </div>

    <!-- Sources -->
    <div class="archive-section">
      <div class="section-head" id="sources-header">
        <span>
          <span class="section-kicker">Sources</span>
          <span class="section-count" id="cnt-sources"></span>
        </span>
        <span class="show-all-link" id="toggle-sources" onclick="toggleSection('sources')">show all →</span>
      </div>
      <div class="archive-rows" id="rows-sources"></div>
    </div>

    <!-- Scans -->
    <div class="archive-section">
      <div class="section-head" id="scans-header">
        <span>
          <span class="section-kicker">Scans</span>
          <span class="section-count" id="cnt-scans"></span>
        </span>
        <span class="show-all-link" id="toggle-scans" onclick="toggleSection('scans')">show all →</span>
      </div>
      <div class="archive-rows" id="rows-scans"></div>
    </div>

    <!-- Dives -->
    <div class="archive-section">
      <div class="section-head" id="dives-header">
        <span>
          <span class="section-kicker">Dives</span>
          <span class="section-count" id="cnt-dives"></span>
        </span>
        <span class="show-all-link" id="toggle-dives" onclick="toggleSection('dives')">show all →</span>
      </div>
      <div class="archive-rows" id="rows-dives"></div>
    </div>

    <!-- Observations -->
    <div class="archive-section">
      <div class="section-head" id="obs-header">
        <span>
          <span class="section-kicker">Observations</span>
          <span class="section-count" id="cnt-obs"></span>
        </span>
        <span class="show-all-link" id="toggle-obs" onclick="toggleSection('obs')">show all →</span>
      </div>
      <div class="archive-rows" id="rows-obs"></div>
    </div>

  </div><!-- /#allSections -->
</main>

<script>
// ── Data (injected server-side) ───────────────────────────────────────────────
const DATA = {
  daily:   {{ daily_editions | tojson }},
  sources: {{ sources | tojson }},
  scans:   {{ scans | tojson }},
  dives:   {{ dives | tojson }},
  obs:     {{ observations | tojson }},
};

const PAGE_SIZE   = 3;
const DAILY_BATCH = 10;
let   _dailyShown = PAGE_SIZE;
const expanded    = { sources: false, scans: false, dives: false, obs: false };
// All four sections are toggleable — hasToggle check drives show/hide logic

// ── Date formatting ────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
  } catch { return iso; }
}

// ── Row builders ──────────────────────────────────────────────────────────────
function dailyRow(ed) {
  const summary = ed.count ? `${ed.count} articles` : '';
  // TODO: link to /briefing/<date> once per-date archive route exists
  return `<div class="archive-row daily-row" data-search="${ed.date} ${summary}">
    <span class="row-date">${fmtDate(ed.date)}</span>
    <span class="row-title muted">${summary || '—'}</span>
  </div>`;
}

function sourceRow(a) {
  return `<div class="archive-row" data-search="${a.title} ${a.source} ${a.date}">
    <span class="row-date">${fmtDate(a.date)}</span>
    <span class="row-title">${esc(a.title)}</span>
    <span class="row-source">${esc(a.source)}</span>
  </div>`;
}

function scanRow(s) {
  return `<div class="archive-row" data-search="${s.title} ${s.source} ${s.date}">
    <span class="row-date">${s.date || '—'}</span>
    <span class="row-title">${esc(s.title)}</span>
    <span class="row-source">${esc(s.source)}</span>
  </div>`;
}

function diveRow(d) {
  return `<div class="archive-row" data-search="${d.title} dive">
    <span class="dive-badge">Thread</span>
    <span class="row-title">${esc(d.title)}</span>
    <a class="row-action" href="/research/dive-result/${encodeURIComponent(d.slug)}">View →</a>
  </div>`;
}

function obsRow(o) {
  const label = o.count ? `${o.count} observation${o.count !== 1 ? 's' : ''}` : 'Observations';
  return `<div class="archive-row" data-search="${o.date} ${label}">
    <span class="row-date">${fmtDate(o.date)}</span>
    <span class="row-title muted">${label}</span>
    <a class="row-action" href="/research/leanings?date=${o.date}">View →</a>
  </div>`;
}

// ── Daily Editions: paginated, rendered once at init ──────────────────────────
function renderDailySection() {
  const items = DATA.daily;
  document.getElementById('cnt-daily').textContent = items.length;
  const el = document.getElementById('rows-daily');
  if (!items.length) {
    el.innerHTML = '<p class="archive-empty">Nothing archived yet.</p>';
    return;
  }
  // All rows rendered in DOM; rows past PAGE_SIZE start hidden
  let html = items.map((ed, i) => {
    const summary = ed.count ? `${ed.count} articles` : '';
    const cls     = i >= PAGE_SIZE ? ' daily-hidden' : '';
    return `<div class="archive-row daily-row${cls}" data-index="${i}" data-search="${ed.date} ${summary}">
      <span class="row-date">${fmtDate(ed.date)}</span>
      <span class="row-title muted">${summary || '—'}</span>
    </div>`;
  }).join('');
  if (items.length > PAGE_SIZE) {
    const remaining = items.length - PAGE_SIZE;
    html += `<div id="daily-show-more" class="archive-row show-more-row" style="justify-content:flex-end;">
      <a href="#" id="daily-expand-btn" onclick="dailyShowMore(event)"
         style="color:var(--accent);font-family:'DM Mono',monospace;font-size:0.7rem;text-decoration:none;">
        show more daily ↓ <span id="daily-remaining">(+ ${remaining} more)</span>
      </a>
    </div>`;
  }
  el.innerHTML = html;
  _dailyShown = PAGE_SIZE;
}

function dailyShowMore(e) {
  e.preventDefault();
  const hidden = Array.from(document.querySelectorAll('.daily-row.daily-hidden'));
  const toShow = hidden.slice(0, DAILY_BATCH);
  toShow.forEach(r => r.classList.remove('daily-hidden'));
  _dailyShown += toShow.length;
  const remaining = DATA.daily.length - _dailyShown;
  if (remaining <= 0) {
    const btn = document.getElementById('daily-show-more');
    if (btn) btn.style.display = 'none';
  } else {
    const rem = document.getElementById('daily-remaining');
    if (rem) rem.textContent = `(+ ${remaining} more)`;
  }
}

// ── Section rendering (Sources, Scans, Dives, Obs) ────────────────────────────
function renderSection(key, items, rowFn, counterId, rowsId) {
  document.getElementById(counterId).textContent = items.length;
  const el        = document.getElementById(rowsId);
  const hasToggle = !!document.getElementById('toggle-' + key);
  // Non-toggleable sections (Dives, Obs) always show all items
  const show = hasToggle ? (expanded[key] ? items : items.slice(0, PAGE_SIZE)) : items;
  let html   = show.map(rowFn).join('');
  if (!items.length) {
    html = '<p class="archive-empty">Nothing archived yet.</p>';
  } else if (hasToggle && !expanded[key] && items.length > PAGE_SIZE) {
    const more = items.length - PAGE_SIZE;
    html += `<div class="archive-row show-more-row" onclick="toggleSection('${key}')">+ ${more} more ${key}</div>`;
  } else if (hasToggle && expanded[key] && items.length > PAGE_SIZE) {
    html += `<div class="bottom-collapse" onclick="toggleSection('${key}')">↑ top · ← show less</div>`;
  }
  el.innerHTML = html;
}

function toggleSection(key) {
  const wasExpanded = expanded[key];
  expanded[key] = !expanded[key];
  const lnk = document.getElementById('toggle-' + key);
  if (lnk) lnk.textContent = expanded[key] ? '← show less' : 'show all →';
  renderAll();
  // On collapse, scroll to section header by ID
  if (wasExpanded) {
    const headerEl = document.getElementById(key + '-header');
    if (headerEl) headerEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function showAll(key) { expanded[key] = true; renderAll(); }

function renderAll() {
  // Daily section rendered once at init — not included here to preserve pagination state
  renderSection('sources', DATA.sources, sourceRow, 'cnt-sources', 'rows-sources');
  renderSection('scans',   DATA.scans,   scanRow,   'cnt-scans',   'rows-scans');
  renderSection('dives',   DATA.dives,   diveRow,   'cnt-dives',   'rows-dives');
  renderSection('obs',     DATA.obs,     obsRow,    'cnt-obs',     'rows-obs');
}

// ── Search ────────────────────────────────────────────────────────────────────
const allItems = [
  ...DATA.daily.map(x   => ({...x, _type: 'EDITION',     _row: dailyRow(x)})),
  ...DATA.sources.map(x => ({...x, _type: 'SOURCE',      _row: sourceRow(x)})),
  ...DATA.scans.map(x   => ({...x, _type: 'SCAN',        _row: scanRow(x)})),
  ...DATA.dives.map(x   => ({...x, _type: 'DIVE',        _row: diveRow(x)})),
  ...DATA.obs.map(x     => ({...x, _type: 'OBSERVATION', _row: obsRow(x)})),
];

function runSearch(q) {
  const sections = document.getElementById('allSections');
  const results  = document.getElementById('searchResults');
  const header   = document.getElementById('searchHeader');
  const rows     = document.getElementById('searchRows');

  if (!q) {
    sections.style.display = '';
    results.style.display  = 'none';
    return;
  }

  sections.style.display = 'none';
  results.style.display  = '';

  const ql      = q.toLowerCase();
  const matches = allItems.filter(x => {
    const hay = `${x.title || ''} ${x.source || ''} ${x.date || ''} ${x.topic || ''}`.toLowerCase();
    return hay.includes(ql);
  }).sort((a, b) => (b.date || '') > (a.date || '') ? 1 : -1);

  header.textContent = matches.length
    ? `Results for "${q}"`
    : `No results for "${q}".`;

  rows.innerHTML = matches.length
    ? matches.map(x => `<div class="archive-row" data-search="">
        <span class="result-type-badge">${x._type}</span>
        ${x._row.replace(/^<div[^>]*>/, '').replace(/<\/div>$/, '')}
       </div>`).join('')
    : '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderDailySection();  // Daily: rendered once, pagination managed independently
renderAll();           // Sources, Scans, Dives, Obs
document.getElementById('searchInput').addEventListener('input', e => runSearch(e.target.value.trim()));

(function(){
  const btn = document.getElementById('navTip');
  if (btn) {
    btn.addEventListener('click', () => btn.classList.toggle('tip-open'));
    document.addEventListener('click', e => { if (btn && !btn.contains(e.target)) btn.classList.remove('tip-open'); });
  }
}());
</script>
</body>
</html>
