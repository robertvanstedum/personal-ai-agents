# Nginx reverse proxy for minimoi — minimoi.ai (primary) + app.minimoi.ai (legacy)
# Run certbot first: sudo certbot --nginx -d minimoi.ai -d app.minimoi.ai
# Then reload: sudo nginx -s reload

server {
    listen 80;
    server_name minimoi.ai app.minimoi.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name minimoi.ai app.minimoi.ai;

    ssl_certificate     /etc/letsencrypt/live/minimoi.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minimoi.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase header and body limits for LLM payloads
    client_max_body_size 10M;
    proxy_read_timeout   120s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Portal (catch-all) — handles all routing including /app/curator and /app/german
    # The portal proxies internally to curator (8766) and german (8767) via Docker network.
    # Do NOT add location blocks for /app/curator/ or /app/german/ here — the portal
    # handles auth and proxying; bypassing it would break session checks.
    location / {
        proxy_pass http://127.0.0.1:5001;
    }
}
