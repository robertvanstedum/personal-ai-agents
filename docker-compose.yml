services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-context-graph
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/simple123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  postgres:
    image: postgres:latest
    container_name: postgres-ai-agents
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-simple123}
      - POSTGRES_DB=personal_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  curator:
    build:
      context: .
      dockerfile: docker/Dockerfile.curator
    container_name: minimoi-curator
    restart: unless-stopped
    env_file: .env
    ports:
      - "8766:8766"
    volumes:
      - ./curator_signals.json:/app/curator_signals.json
      - ./curator_latest.json:/app/curator_latest.json
      - ./curator_radar.json:/app/curator_radar.json
      - ./interests:/app/interests
      - ./_NewDomains/research-intelligence/data:/app/_NewDomains/research-intelligence/data

  german:
    build:
      context: .
      dockerfile: docker/Dockerfile.german
    container_name: minimoi-german
    restart: unless-stopped
    env_file: .env
    ports:
      - "8767:8767"
    volumes:
      - ./domains/german/data:/app/domains/german/data

  portal:
    build:
      context: .
      dockerfile: docker/Dockerfile.portal
    container_name: minimoi-portal
    restart: unless-stopped
    env_file: .env
    environment:
      - CURATOR_BACKEND=http://curator:8766
      - GERMAN_BACKEND=http://german:8767
      - COS_BACKEND=http://cos:18769
      # Portuguese runs as a native launchd process on the Mac (port 8770),
      # not a Docker container — host.docker.internal reaches back out to
      # the host machine from inside this container.
      - PORTUGUESE_BACKEND=http://host.docker.internal:8770
    ports:
      - "5001:5001"
    depends_on:
      - curator
      - german

  # CoS scheduler — Phase 1 containerized version. Runs on port 18769 (dev)
  # so it coexists with the bare launchd process on 8769 during testing.
  # Rollback: docker stop minimoi-cos-dev, bare process continues on 8769.
  cos:
    build:
      context: .
      dockerfile: docker/Dockerfile.cos
    container_name: minimoi-cos-dev
    env_file: .env
    environment:
      - MINIMOI_ROLE=standby
      - PORT=18769
      - DISABLE_TELEGRAM_POLL=1
    volumes:
      - ./domains/cos:/app/domains/cos
      - ./data:/app/data
      - ./docs:/app/docs
      - ./data/guild/build_queue.json:/app/data/guild/build_queue.json
      - ./agent_logs:/app/agent_logs
    ports:
      - "127.0.0.1:18769:18769"
    depends_on:
      - postgres

volumes:
  neo4j-data:
  postgres-data:
