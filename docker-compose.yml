services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-context-graph
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/simple123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  postgres:
    image: postgres:latest
    container_name: postgres-ai-agents
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=simple123
      - POSTGRES_DB=personal_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  curator:
    build:
      context: .
      dockerfile: docker/Dockerfile.curator
    container_name: minimoi-curator
    restart: unless-stopped
    env_file: .env
    ports:
      - "8766:8766"
    volumes:
      - ./curator_signals.json:/app/curator_signals.json
      - ./curator_latest.json:/app/curator_latest.json
      - ./curator_radar.json:/app/curator_radar.json

  german:
    build:
      context: .
      dockerfile: docker/Dockerfile.german
    container_name: minimoi-german
    restart: unless-stopped
    env_file: .env
    ports:
      - "8767:8767"
    volumes:
      - ./domains/german/data:/app/domains/german/data

  portal:
    build:
      context: .
      dockerfile: docker/Dockerfile.portal
    container_name: minimoi-portal
    restart: unless-stopped
    env_file: .env
    ports:
      - "5001:5001"
    depends_on:
      - curator
      - german

volumes:
  neo4j-data:
  postgres-data:
